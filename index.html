<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VEO 3 PRO STUDIO - Premium UGC Suite</title>
    
    <!-- Pustaka Utama Berbasis CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* Desain dasar yang aman untuk mencegah layar putih/hitam sejak awal muat */
        body { 
            background-color: #0b0f19 !important; 
            color: #f8fafc !important; 
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            margin: 0;
            padding: 0;
        }
    </style>
</head>
<body>
    <div id="root">
        <!-- Loader bawaan sebelum React mengambil alih -->
        <div id="fallback-loader" style="display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; text-align: center; background-color: #0b0f19;">
            <h2 style="color: #0ea5e9; font-family: sans-serif; margin-bottom: 8px; letter-spacing: 0.05em;">VEO 3 PRO STUDIO</h2>
            <p style="color: #94a3b8; font-family: sans-serif; font-size: 14px;">Memuat Inisialisasi Engine AI...</p>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // Komponen Pengaman Ikon Lucide untuk Menghindari Crash Sisi Klien
        const SafeIcon = ({ name, className = "w-4 h-4", ...props }) => {
            useEffect(() => {
                if (window.lucide && typeof window.lucide.createIcons === 'function') {
                    window.lucide.createIcons();
                }
            });
            const icons = window.lucide || {};
            const TargetIcon = icons[name];
            if (TargetIcon) {
                return <TargetIcon className={className} {...props} />;
            }
            return <span className={`inline-block border border-current rounded-sm ${className}`} style={{ opacity: 0.5 }}></span>;
        };

        // Database Konfigurasi Kategori
        const INDUSTRY_CATEGORIES = [
          { value: "food", label: "Culinary & Food (Kuliner Maknyus)" },
          { value: "beverage", label: "Beverage & Drinks (Minuman Kekinian)" },
          { value: "fashion", label: "Fashion & Apparel (Gaya & Busana)" },
          { value: "beauty", label: "Beauty & Skincare (Kecantikan & Kulit)" },
          { value: "healthcare", label: "Healthcare & Wellness (Kesehatan)" },
          { value: "saas_tech", label: "SaaS & Software Technology" },
          { value: "local_umkm", label: "Local UMKM & Handcrafts" }
        ];

        // Parser Output Markdown ke Komponen React murni
        const parseMarkdownToReact = (text) => {
          if (!text) return null;
          const lines = text.split('\n');
          const elements = [];
          let currentTableHeaders = [];
          let currentTableRows = [];
          let inTable = false;

          for (let i = 0; i < lines.length; i++) {
            const line = lines[i].trim();

            if (line.startsWith('|')) {
              inTable = true;
              const cells = line.split('|').map(cell => cell.trim()).filter((_, idx, arr) => idx > 0 && idx < arr.length - 1);
              const isDivider = cells.every(cell => cell.startsWith('-') || (cell.startsWith(':') && cell.endsWith(':')));
              if (isDivider) continue;

              if (currentTableHeaders.length === 0) {
                currentTableHeaders = cells;
              } else {
                currentTableRows.push(cells);
              }
              continue;
            } else {
              if (inTable && currentTableHeaders.length > 0) {
                elements.push(
                  <div key={`table-${i}`} className="overflow-x-auto my-4 border border-cyan-500/30 rounded-xl">
                    <table className="min-w-full divide-y divide-cyan-500/20 text-sm bg-slate-900 text-white">
                      <thead className="bg-slate-800 text-cyan-300">
                        <tr>
                          {currentTableHeaders.map((hdr, hIdx) => <th key={hIdx} className="px-4 py-2 text-left text-xs uppercase font-bold">{hdr}</th>)}
                        </tr>
                      </thead>
                      <tbody className="divide-y divide-slate-700">
                        {currentTableRows.map((row, rIdx) => (
                          <tr key={rIdx}>
                            {row.map((cell, cIdx) => <td key={cIdx} className="px-4 py-2 text-xs">{cell}</td>)}
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                );
                currentTableHeaders = [];
                currentTableRows = [];
                inTable = false;
              }
            }

            if (line.startsWith('###')) {
              elements.push(<h4 key={i} className="text-base font-bold text-cyan-400 mt-4 mb-2">{line.replace('###', '').trim()}</h4>);
              continue;
            }
            if (line.startsWith('##') || line.startsWith('#')) {
              elements.push(<h3 key={i} className="text-lg font-black text-purple-400 mt-5 mb-3">{line.replace(/^#+\s*/, '').trim()}</h3>);
              continue;
            }
            if (line.startsWith('-') || line.startsWith('*')) {
              elements.push(<div key={i} className="text-sm pl-4 my-1 text-slate-300">• {line.replace(/^[-*]\s*/, '').trim()}</div>);
              continue;
            }
            if (line === '') continue;
            elements.push(<p key={i} className="text-sm text-slate-300 my-1">{line}</p>);
          }
          return <div className="space-y-1">{elements}</div>;
        };

        // Aplikasi Utama
        function App() {
          const [apiKey, setApiKey] = useState(() => localStorage.getItem('veo_studio_apikey') || '');
          const [showApiKey, setShowApiKey] = useState(false);
          const [isDarkMode, setIsDarkMode] = useState(true); // Default mode gelap premium sesuai desain dasar

          const [formData, setFormData] = useState({
            name: 'Basreng Kaffir Jeruk Purut',
            desc: 'Camilan bakso goreng super renyah beraroma irisan daun jeruk purut segar dengan limpahan cabai asli dan gurih umami tinggi.',
            price: '15000',
            targetOmzet: '20000000',
            industryCategory: 'food'
          });

          const [activeTab, setActiveTab] = useState('planner');
          const [isLoading, setIsLoading] = useState(false);
          const [outputs, setOutputs] = useState({ planner: '', calendar: '', caption: '', generator: '' });

          useEffect(() => {
            // Hapus loader bawaan HTML ketika React sudah siap terpasang sempurna
            const loader = document.getElementById('fallback-loader');
            if (loader) loader.remove();
          }, []);

          const handleSaveApiKey = (key) => {
            setApiKey(key);
            localStorage.setItem('veo_studio_apikey', key);
          };

          const executeAction = async () => {
            if (!apiKey) return;
            setIsLoading(true);
            try {
              const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
              const response = await fetch(apiUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  contents: [{ parts: [{ text: `Bertindaklah sebagai UGC Creator Expert. Buatkan konsep ${activeTab} komprehensif untuk produk ini: ${JSON.stringify(formData)}. Tulis langsung dalam format Markdown tanpa penjelasan pembuka.` }] }]
                })
              });
              const data = await response.json();
              const text = data?.candidates?.[0]?.content?.parts?.[0]?.text || "Gagal memproses pembuatan konten.";
              setOutputs(prev => ({ ...prev, [activeTab]: text }));
            } catch (err) {
              setOutputs(prev => ({ ...prev, [activeTab]: `Eror API: ${err.message}` }));
            } finaly {
              setIsLoading(false);
            }
          };

          return (
            <div className={`min-h-screen flex flex-col transition-colors duration-200 ${isDarkMode ? 'bg-[#0b0f19] text-slate-100' : 'bg-slate-50 text-slate-900'}`}>
              
              {/* HEADER UTAMA */}
              <header className={`border-b sticky top-0 z-40 px-6 py-4 ${isDarkMode ? 'bg-[#0f172a]/90 border-slate-800/80 backdrop-blur-md' : 'bg-white border-slate-200 shadow-sm'}`}>
                <div className="max-w-7xl mx-auto flex justify-between items-center">
                  <div className="flex items-center gap-3">
                    <div className="p-2 bg-cyan-500/10 rounded-xl border border-cyan-500/20">
                      <SafeIcon className="w-5 h-5 text-cyan-400" name="Flame"/>
                    </div>
                    <div>
                      <h1 className="text-lg md:text-xl font-black bg-gradient-to-r from-cyan-400 to-indigo-400 bg-clip-text text-transparent tracking-wide">VEO 3 PRO STUDIO</h1>
                      <p className="text-[10px] text-slate-400 font-mono tracking-wider uppercase">Premium UGC Suite & Business Architect v3.5</p>
                    </div>
                  </div>
                  <button 
                    onClick={() => setIsDarkMode(!isDarkMode)}
                    className={`p-2.5 rounded-xl border text-xs flex items-center gap-2 transition ${isDarkMode ? 'bg-slate-800/60 border-slate-700 text-yellow-400 hover:bg-slate-800' : 'bg-slate-100 border-slate-200 text-slate-700 hover:bg-slate-200'}`}
                  >
                    <SafeIcon className="w-4 h-4" name={isDarkMode ? "Sun" : "Moon"}/>
                    <span className="hidden sm:inline font-medium">{isDarkMode ? "Mode Terang" : "Mode Gelap"}</span>
                  </button>
                </div>
              </header>

              {/* AREA DASHBOARD */}
              <main className="max-w-7xl w-full mx-auto p-4 md:p-6 grid grid-cols-1 lg:grid-cols-12 gap-6 flex-grow">
                
                {/* FORM INPUT PANEL */}
                <aside className="lg:col-span-4 space-y-4">
                  {/* API KEY PANEL */}
                  <div className={`p-5 rounded-2xl border ${isDarkMode ? 'bg-[#0f172a] border-slate-800/80' : 'bg-white border-slate-200 shadow-sm'}`}>
                    <div className="flex items-center gap-2 mb-3">
                      <SafeIcon className="w-4 h-4 text-cyan-400" name="Lock"/>
                      <label className="text-xs font-bold uppercase tracking-wider text-slate-400 block">Google Gemini API Key</label>
                    </div>
                    <div className="relative flex items-center">
                      <input 
                        type={showApiKey ? "text" : "password"} 
                        placeholder="Masukkan AIzaSy..." 
                        value={apiKey} 
                        onChange={(e) => handleSaveApiKey(e.target.value)}
                        className={`w-full border rounded-xl pl-4 pr-10 py-2 text-xs font-mono focus:outline-none focus:border-cyan-500 transition ${isDarkMode ? 'bg-[#070a13] border-slate-800 text-cyan-400' : 'bg-slate-50 border-slate-200 text-slate-800'}`}
                      />
                      <button onClick={() => setShowApiKey(!showApiKey)} className="absolute right-3 text-slate-400 hover:text-cyan-400 transition">
                        <SafeIcon className="w-4 h-4" name={showApiKey ? "EyeOff" : "Eye"}/>
                      </button>
                    </div>
                    {!apiKey && <p className="text-[10px] text-red-400 mt-2 font-mono flex items-center gap-1">⚠️ Menunggu Input Kunci API...</p>}
                  </div>

                  {/* PARAMETER BISNIS */}
                  <div className={`p-5 rounded-2xl border space-y-4 ${isDarkMode ? 'bg-[#0f172a] border-slate-800/80' : 'bg-white border-slate-200 shadow-sm'}`}>
                    <div className="border-b border-slate-800 pb-2 flex items-center gap-2">
                      <SafeIcon className="w-4 h-4 text-purple-400" name="Briefcase"/>
                      <h3 className="text-xs font-bold uppercase tracking-wider text-slate-400">Parameter Bisnis Global</h3>
                    </div>
                    
                    <div>
                      <label className="text-[10px] font-bold text-slate-400 uppercase block mb-1">Nama Produk / Bisnis</label>
                      <input type="text" value={formData.name} onChange={(e) => setFormData({...formData, name: e.target.value})} className={`w-full border rounded-xl p-2.5 text-xs focus:outline-none focus:border-cyan-500 ${isDarkMode ? 'bg-[#070a13] border-slate-800 text-white' : 'bg-slate-50 border-slate-200'}`} />
                    </div>
                    <div>
                      <label className="text-[10px] font-bold text-slate-400 uppercase block mb-1">Deskripsi Singkat & Cara Kerja</label>
                      <textarea rows={3} value={formData.desc} onChange={(e) => setFormData({...formData, desc: e.target.value})} className={`w-full border rounded-xl p-2.5 text-xs focus:outline-none focus:border-cyan-500 ${isDarkMode ? 'bg-[#070a13] border-slate-800 text-white' : 'bg-slate-50 border-slate-200'}`} />
                    </div>
                    <div>
                      <label className="text-[10px] font-bold text-slate-400 uppercase block mb-1">Kategori Makro Industri</label>
                      <select value={formData.industryCategory} onChange={(e) => setFormData({...formData, industryCategory: e.target.value})} className={`w-full border rounded-xl p-2.5 text-xs focus:outline-none focus:border-cyan-500 ${isDarkMode ? 'bg-[#070a13] border-slate-800 text-white' : 'bg-slate-50 border-slate-200'}`}>
                        {INDUSTRY_CATEGORIES.map(c => <option key={c.value} value={c.value} className="text-slate-800">{c.label}</option>)}
                      </select>
                    </div>
                  </div>
                </aside>

                {/* OUTPUT WORKSPACE CONSOLE */}
                <section className="lg:col-span-8 flex flex-col space-y-4">
                  {/* TAB MENU */}
                  <div className={`p-1.5 rounded-xl border flex gap-1 ${isDarkMode ? 'bg-[#0f172a] border-slate-800/80' : 'bg-white border-slate-200 shadow-sm'}`}>
                    {['planner', 'calendar', 'caption', 'generator'].map((tab) => (
                      <button 
                        key={tab} 
                        onClick={() => setActiveTab(tab)} 
                        className={`flex-1 py-2.5 text-center text-xs font-bold uppercase tracking-wider rounded-lg transition ${activeTab === tab ? 'bg-cyan-500/10 text-cyan-400 border border-cyan-500/20' : 'text-slate-400 hover:text-slate-200'}`}
                      >
                        {tab}
                      </button>
                    ))}
                  </div>

                  {/* KONSOL PANEL UTAMA */}
                  <div className={`p-6 rounded-2xl border min-h-[400px] flex flex-col justify-between ${isDarkMode ? 'bg-[#0f172a]/40 border-slate-800/60' : 'bg-white border-slate-200 shadow-sm'}`}>
                    <div className="w-full">
                      <div className="flex justify-between items-center border-b border-slate-800 pb-3 mb-4">
                        <span className="text-xs font-bold uppercase tracking-wider text-slate-400 flex items-center gap-2">
                          <span className="w-2 h-2 rounded-full bg-cyan-400 animate-pulse"></span> Panel Hasil ({activeTab})
                        </span>
                      </div>

                      <div className="output-screen-wrapper">
                        {isLoading ? (
                          <div className="py-20 text-center space-y-3">
                            <div className="w-9 h-9 border-4 border-cyan-400 border-t-transparent rounded-full animate-spin mx-auto"></div>
                            <p className="text-xs font-mono text-cyan-400 animate-pulse uppercase tracking-widest">Sistem Engine AI Sedang Memproses Data...</p>
                          </div>
                        ) : outputs[activeTab] ? (
                          <div className="prose max-w-none">{parseMarkdownToReact(outputs[activeTab])}</div>
                        ) : (
                          <div className="py-20 text-center text-slate-500 space-y-2">
                            <SafeIcon className="w-8 h-8 mx-auto text-slate-600 animate-bounce" name="Sparkles"/>
                            <p className="text-xs font-bold uppercase tracking-wide">Konsol Siap Dioperasikan</p>
                            <p className="text-[11px] text-slate-400 max-w-xs mx-auto">Isi formulir parameter produk di sebelah kiri, masukkan API Key Anda, lalu klik tombol jalankan di bawah ini.</p>
                          </div>
                        )}
                      </div>
                    </div>

                    <div className="pt-4 mt-6 border-t border-slate-800">
                      <button 
                        onClick={executeAction} 
                        disabled={isLoading || !apiKey} 
                        className={`w-full py-3.5 rounded-xl font-bold text-xs uppercase tracking-widest text-white transition-all ${!apiKey ? 'bg-slate-800 text-slate-500 cursor-not-allowed border border-slate-700/50' : 'bg-gradient-to-r from-cyan-500 to-indigo-600 hover:shadow-lg hover:shadow-cyan-500/10 hover:brightness-110 cursor-pointer'}`}
                      >
                        Jalankan Solusi AI Studio
                      </button>
                    </div>
                  </div>
                </section>
              </main>

              <footer className="py-4 text-center text-[10px] font-mono border-t border-slate-800/40 text-slate-500">
                <p>© 2026 Veo 3 Pro Studio Suite. Berjalan Penuh Langsung pada Sisi Klien Browser Anda.</p>
              </footer>
            </div>
          );
        }

        // Render Inisialisasi React DOM 18 Aman
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App/>);
    </script>
</body>
</html>
