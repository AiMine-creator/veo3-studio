function calculateSanityScore(capital, price, targetOmzet){
  const cap = parseFloat(capital)||0, prc = parseFloat(price)||1, tgt = parseFloat(targetOmzet)||1;
  const ratio = cap/tgt;
  const neededQty = tgt/prc;
  const traffic = neededQty/0.025;
  let score, label, cls;
  if(ratio < 0.05){ score=40; label="Risiko Tinggi — Modal Terlalu Minim"; cls="badge-red" }

  else { score=95; label="Sangat Sehat — Modal Cukup untuk Target Ini"; cls="badge-green" }
  return {score, label, cls, neededQty: Math.ceil(neededQty), traffic: Math.ceil(traffic), ratio:(ratio*100).toFixed(1)};
}

// ─── MARKDOWN PARSER ─────────────────────────────────────────
function parseMarkdownToReact(text){
  if(!text) return null;
  const lines = text.split('\n');
  const result = [];
  let tableRows = [], inTable = false;
  let i = 0;

  function flushTable(){
    if(!tableRows.length) return;
    const headers = tableRows[0];
    const body = tableRows.slice(1);
    result.push(
      <div key={`t${i}`} style={{overflowX:'auto',marginBottom:16}}>
        <table className="md-table">
          <thead><tr>{headers.map((h,hi)=><th key={hi}>{h.trim()}</th>)}</tr></thead>
          <tbody>{body.map((row,ri)=>(
            <tr key={ri}>{row.map((cell,ci)=><td key={ci}><span dangerouslySetInnerHTML={{__html:cell.trim().replace(/\*\*(.*?)\*\*/g,'<strong style="color:var(--cyan)">$1</strong>').replace(/`(.*?)`/g,'<code style="background:rgba(6,182,212,.1);padding:1px 5px;border-radius:3px;font-family:monospace;font-size:.8em">$1</code>')}}/></td>)}</tr>
          ))}</tbody>
        </table>
      </div>
    );
    tableRows = [];
  }

  while(i < lines.length){
    const line = lines[i];
    const trimmed = line.trim();

    if(trimmed.startsWith('|')){
      const cols = trimmed.split('|').filter((_,idx,a)=>idx>0&&idx<a.length-1);
      if(cols.every(c=>/^[-:\s]+$/.test(c))){ i++; continue; }
      if(!inTable){ inTable=true }
      tableRows.push(cols);
      i++; continue;
    } else if(inTable){
      inTable=false; flushTable();
    }

    if(/^### /.test(trimmed)){
      result.push(<h3 key={i} className="grotesk grad-text" style={{fontSize:'1rem',fontWeight:700,marginTop:20,marginBottom:8}}>{trimmed.slice(4)}</h3>);
    } else if(/^## /.test(trimmed)){
      result.push(<h2 key={i} className="grotesk" style={{fontSize:'1.15rem',fontWeight:700,marginTop:24,marginBottom:10,color:'var(--cyan)',borderBottom:'1px solid rgba(6,182,212,.2)',paddingBottom:6}}>{trimmed.slice(3)}</h2>);
    } else if(/^# /.test(trimmed)){
      result.push(<h1 key={i} className="grotesk grad-text" style={{fontSize:'1.4rem',fontWeight:800,marginTop:28,marginBottom:12}}>{trimmed.slice(2)}</h1>);
    } else if(/^[-*] /.test(trimmed)){
      result.push(<div key={i} style={{display:'flex',gap:8,marginBottom:4,paddingLeft:8}}><span style={{color:'var(--cyan)',marginTop:2,flexShrink:0}}>▸</span><span style={{color:'var(--text-secondary)',fontSize:'.85rem'}} dangerouslySetInnerHTML={{__html:trimmed.slice(2).replace(/\*\*(.*?)\*\*/g,'<strong style="color:var(--text-primary)">$1</strong>')}}/></div>);
    } else if(/^\d+\. /.test(trimmed)){
      result.push(<div key={i} style={{display:'flex',gap:8,marginBottom:4,paddingLeft:8}}><span style={{color:'var(--purple)',minWidth:20,fontSize:'.8rem',fontWeight:700}}>{trimmed.match(/^\d+/)[0]}.</span><span style={{color:'var(--text-secondary)',fontSize:'.85rem'}} dangerouslySetInnerHTML={{__html:trimmed.replace(/^\d+\. /,'').replace(/\*\*(.*?)\*\*/g,'<strong style="color:var(--text-primary)">$1</strong>')}}/></div>);
    } else if(trimmed === '' || trimmed === '---'){
      if(trimmed==='---') result.push(<hr key={i} style={{border:'none',borderTop:'1px solid var(--border)',margin:'16px 0'}}/>);
      else result.push(<div key={i} style={{height:6}}/>);
    } else if(trimmed){
      result.push(<p key={i} style={{color:'var(--text-secondary)',fontSize:'.85rem',lineHeight:1.7,marginBottom:6}} dangerouslySetInnerHTML={{__html:trimmed.replace(/\*\*(.*?)\*\*/g,'<strong style="color:var(--text-primary)">$1</strong>').replace(/`(.*?)`/g,'<code style="background:rgba(6,182,212,.1);padding:1px 5px;border-radius:3px;font-family:monospace;font-size:.8em">$1</code>')}}/>);
    }
    i++;
  }
  if(inTable) flushTable();
  return result;
}

const SCENE_META = [

];

function extractScenes(text){
  if(!text) return [];
  const scenes = [];
  const rows = text.split('\n').filter(l=>l.includes('|'));
  const dataRows = rows.filter(r=>{
    const cols=r.split('|').filter((_,i,a)=>i>0&&i<a.length-1);
    return cols.length>=2 && !/^[-:\s|]+$/.test(r) && !/Scene.*Durasi/.test(r);
  });
  dataRows.slice(0,5).forEach((row,idx)=>{
    const cols = row.split('|').filter((_,i,a)=>i>0&&i<a.length-1).map(c=>c.trim());
    scenes.push({
      scene: cols[0]||`Scene ${idx+1}`,
      visual: cols[1]||"",
      audio: cols[2]||"",
      subtitle: cols[3]||"",
      imagenPrompt: cols[4]||"",
    });
  });
  return scenes.length ? scenes : [];
}

// ─── CANVAS TYPOGRAPHY EXPORTER ──────────────────────────────
function roundRectManual(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

function wrapText(ctx,text,x,y,maxW,lineH){
  const words=text.split(' ');
  let line='',lines=[];
  for(let w of words){
    const test=line?line+' '+w:w;
    if(ctx.measureText(test).width>maxW&&line){lines.push(line);line=w;}
    else line=test;
  }
  lines.push(line);
  lines.forEach((l,i)=>ctx.fillText(l,x,y+i*lineH));
  return lines.length*lineH;
}

function renderSlide(canvas, theme, scene, sceneIdx, productName){
  if(!canvas) return;
  const ctx = canvas.getContext('2d');
  const W=1080,H=1080;
  canvas.width=W; canvas.height=H;
  const t = GRAD_THEMES.find(g=>g.id===theme)||GRAD_THEMES[0];
  // BG gradient
  const grad = ctx.createLinearGradient(0,0,W,H);
  grad.addColorStop(0,t.from); grad.addColorStop(1,t.to);
  ctx.fillStyle=grad; ctx.fillRect(0,0,W,H);
  // Grid dots
  ctx.fillStyle='rgba(255,255,255,.04)';
  for(let x=0;x<W;x+=40) for(let y=0;y<H;y+=40) {ctx.beginPath();ctx.arc(x,y,1.5,0,Math.PI*2);ctx.fill();}
  // Corner brackets
  const bc=t.accent; const bs=4; const bl=60;
  [[0,0],[W,0],[0,H],[W,H]].forEach(([cx,cy])=>{
    ctx.strokeStyle=bc; ctx.lineWidth=bs;
    ctx.beginPath();ctx.moveTo(cx+(cx?-bl:bl),cy);ctx.lineTo(cx,cy);ctx.lineTo(cx,cy+(cy?-bl:bl));ctx.stroke();
  });
  // Scene number
  ctx.font='bold 140px JetBrains Mono,monospace';
  ctx.fillStyle='rgba(255,255,255,.04)';
  ctx.fillText(`0${sceneIdx+1}`,40,220);
  // Scene label
  ctx.font='bold 28px Space Grotesk,sans-serif';
  ctx.fillStyle=bc;
  ctx.fillText(`SCENE ${sceneIdx+1} — ${(SCENE_META[sceneIdx]||{label:''}).label.toUpperCase()}`,48,78);
  // Duration tag
  ctx.font='16px JetBrains Mono,monospace';
  ctx.fillStyle='rgba(255,255,255,.5)';
  ctx.fillText(`${6+(sceneIdx*3)}s — ${9+(sceneIdx*3)}s`,48,108);
  // Product watermark top right
  ctx.font='bold 14px Space Grotesk,sans-serif';
  ctx.fillStyle='rgba(255,255,255,.35)';
  ctx.textAlign='right';
  ctx.fillText('VEO 3 PRO STUDIO',W-48,50);
  ctx.fillText(productName||'Product',W-48,72);
  ctx.textAlign='left';
  // Visual box
  const vt=scene?.visual||'Visual direction goes here';
  ctx.strokeStyle=bc; ctx.lineWidth=1.5;
  roundRectManual(ctx,48,240,W-96,200,12);
  ctx.stroke();
  const vg2=ctx.createLinearGradient(48,240,48,440);
  vg2.addColorStop(0,'rgba(255,255,255,.06)');vg2.addColorStop(1,'rgba(255,255,255,.02)');
  ctx.fillStyle=vg2; ctx.fill();
  ctx.font='bold 15px Space Grotesk,sans-serif'; ctx.fillStyle=bc;
  ctx.fillText('📷  VISUAL & CAMERA',64,274);
  ctx.font='18px Inter,sans-serif'; ctx.fillStyle='rgba(255,255,255,.85)';
  wrapText(ctx,vt,64,306,W-128,28);
  // Audio box
  const at=scene?.audio||'Voiceover / dialog goes here';
  roundRectManual(ctx,48,460,W-96,200,12);
  ctx.strokeStyle=t.accent; ctx.lineWidth=1.5; ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,.03)'; ctx.fill();
  ctx.font='bold 15px Space Grotesk,sans-serif'; ctx.fillStyle=t.text||'#fff';
  ctx.fillText('🎙  AUDIO & VOICEOVER',64,494);
  ctx.font='italic 20px Inter,sans-serif'; ctx.fillStyle='rgba(255,255,255,.8)';
  ctx.fillText('"',64,534);
  wrapText(ctx,at,88,534,W-150,30);
  // Footer subtitle
  const sub=scene?.subtitle||'On-screen text';
  const fg=ctx.createLinearGradient(0,H-140,0,H);
  fg.addColorStop(0,t.accent+'55'); fg.addColorStop(1,t.accent+'cc');
  ctx.fillStyle=fg; roundRectManual(ctx,0,H-130,W,130,0); ctx.fill();
  ctx.font='bold 36px Space Grotesk,sans-serif'; ctx.fillStyle='#fff';
  ctx.textAlign='center';
  wrapText(ctx,sub,W/2,H-85,W-80,44);
  ctx.textAlign='left';
}

function CanvasExporter({scenes, productName}){
  const [theme,setTheme]=useState('cyber');
  const canvasRefs=useRef([null,null,null,null,null]);
  const [rendered,setRendered]=useState(false);
  const [toast,setToast]=useState('');

  const renderAll=useCallback(()=>{
    scenes.slice(0,5).forEach((scene,idx)=>{
      const canvas=canvasRefs.current[idx];
      if(canvas) renderSlide(canvas,theme,scene,idx,productName);
    });
    setRendered(true);
  },[scenes,theme,productName]);

  useEffect(()=>{ if(scenes.length) renderAll(); },[scenes,theme]);

  const download=(idx)=>{
    const c=canvasRefs.current[idx];
    if(!c) return;
    const link=document.createElement('a');
    link.download=`scene_${idx+1}_${theme}.png`;
    link.href=c.toDataURL('image/png');
    link.click();
    setToast(`Scene ${idx+1} diunduh!`);
    setTimeout(()=>setToast(''),2500);
  };

  if(!scenes.length) return null;
  return (
    <div style={{marginTop:32}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16,flexWrap:'wrap',gap:10}}>
        <h3 className="grotesk" style={{color:'var(--cyan)',fontSize:'1rem',fontWeight:700}}>🎨 Typography Carousel Exporter</h3>
        <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
          {GRAD_THEMES.map(g=>(
            <button key={g.id} onClick={()=>setTheme(g.id)} className="btn" style={{
              padding:'5px 12px',fontSize:'.75rem',
              background:theme===g.id?`linear-gradient(135deg,${g.from},${g.to})`:'rgba(255,255,255,.05)',
              border:theme===g.id?`1px solid ${g.accent}`:'1px solid var(--border)',
              color:theme===g.id?g.text:'var(--text-secondary)',
            }}>{g.label}</button>
          ))}
        </div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(200px,1fr))',gap:12}}>
        {scenes.slice(0,5).map((_,idx)=>(
          <div key={idx} className="card2" style={{padding:10}}>
            <p style={{fontSize:'.75rem',color:'var(--cyan)',marginBottom:8,fontWeight:600}}>Scene {idx+1} — {(SCENE_META[idx]||{label:''}).label}</p>
            <canvas ref={el=>canvasRefs.current[idx]=el} style={{width:'100%',borderRadius:8,border:'1px solid var(--border)'}}/>
            <button onClick={()=>download(idx)} className="btn btn-ghost" style={{width:'100%',marginTop:8,fontSize:'.75rem'}}>
              {icons.download} Unduh PNG
            </button>
          </div>
        ))}
      </div>
      {toast&&<div className="copy-toast">{icons.check} {toast}</div>}
    </div>
  );
}

function ImageUploader({label,value,onChange}){
  const fileRef=useRef();
  const handleFile=(e)=>{
    const file=e.target.files[0];
    if(!file) return;
    const reader=new FileReader();
    reader.onload=ev=>onChange({data:ev.target.result.split(',')[1],mime:file.type,preview:ev.target.result});
    reader.readAsDataURL(file);
  };
  return (
    <div>
      <p style={{fontSize:'.78rem',color:'var(--text-muted)',marginBottom:8}}>{label}</p>
      {value?.preview ? (
        <div style={{position:'relative',display:'inline-block'}}>
          <img src={value.preview} alt="preview" style={{width:120,height:120,objectFit:'cover',borderRadius:10,border:'2px solid var(--cyan)'}}/>
          <button onClick={()=>onChange(null)} className="btn btn-red" style={{position:'absolute',top:-8,right:-8,padding:'2px 6px',fontSize:'.7rem'}}>{icons.trash}</button>
        </div>
      ) : (
        <div className="img-upload-box" onClick={()=>fileRef.current.click()}>
          <div style={{color:'var(--text-muted)',fontSize:'.8rem'}}>{icons.img} <br/>Klik untuk upload gambar</div>
        </div>
      )}
      <input ref={fileRef} type="file" accept="image/*" onChange={handleFile} style={{display:'none'}}/>
    </div>
  );
}

    <div className="card" style={{marginBottom:20,borderColor:`${info.color}33`}}>
      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:16,flexWrap:'wrap'}}>
        <div>
          <div className="grotesk" style={{fontSize:'1.25rem',fontWeight:800,marginBottom:4}}>{info.icon} {info.title}</div>
          <div style={{fontSize:'.83rem',color:'var(--text-muted)'}}>{info.desc}</div>
          {!apiKey&&<div style={{marginTop:10,padding:'7px 12px',borderRadius:8,background:'rgba(239,68,68,.1)',border:'1px solid rgba(239,68,68,.25)',fontSize:'.78rem',color:'#f87171',display:'flex',gap:6,alignItems:'center'}}>{icons.warn} API Key Gemini diperlukan — isi di panel kiri</div>}
        </div>
        <button onClick={onGenerate} disabled={!apiKey||loading} className="btn btn-cyan" style={{flexShrink:0,padding:'11px 24px',fontSize:'.9rem'}}>
          {loading?<><span className="spin">{icons.loader}</span> Generating...</>:<>{icons.sparkles} Generate AI</>}
        </button>
      </div>
    </div>
  );
}

// ─── UGC EXTRA FORM ──────────────────────────────────────────
function UGCExtraForm({ugcForm,setUgcForm,imgProduct,setImgProduct,imgModel,setImgModel}){
  return (
    <div className="card" style={{marginBottom:20}}>
      <h4 className="grotesk" style={{color:'var(--cyan)',fontSize:'.9rem',fontWeight:700,marginBottom:14}}>⚙️ Pengaturan UGC Lanjutan</h4>
      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:14}}>
        <input type="checkbox" id="autonom" checked={ugcForm.useAutonomous} onChange={e=>setUgcForm(p=>({...p,useAutonomous:e.target.checked}))} style={{accentColor:'var(--cyan)',width:16,height:16}}/>
        <label htmlFor="autonom" style={{fontSize:'.83rem',color:'var(--text-secondary)',cursor:'pointer'}}>Gunakan Data Produk Khusus UGC (override data sidebar)</label>
      </div>
      {ugcForm.useAutonomous&&(
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:16}}>
          <div>
            <label style={{fontSize:'.75rem',color:'var(--text-muted)',marginBottom:4,display:'block'}}>Nama Produk UGC</label>
            <input className="inp" value={ugcForm.name} onChange={e=>setUgcForm(p=>({...p,name:e.target.value}))} placeholder="Nama produk spesifik UGC..."/>
          </div>
          <div>
            <label style={{fontSize:'.75rem',color:'var(--text-muted)',marginBottom:4,display:'block'}}>Deskripsi UGC</label>
            <input className="inp" value={ugcForm.desc} onChange={e=>setUgcForm(p=>({...p,desc:e.target.value}))} placeholder="Deskripsi khusus UGC..."/>
          </div>
        </div>
      )}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
        <ImageUploader label="📦 Foto Produk (opsional)" value={imgProduct} onChange={setImgProduct}/>
        <ImageUploader label="👤 Foto Model/Talent (opsional)" value={imgModel} onChange={setImgModel}/>
      </div>
    </div>
  );
}

// ─── MAIN APP CONTENT ─────────────────────────────────────────
function AppContent(){
  const [theme,setTheme]=useState(()=>safeGet('veo_theme','dark'));
  const [apiKey,setApiKey]=useState(()=>safeGet('veo_studio_apikey',''));
  const [activeTab,setActiveTab]=useState('planner');
  const [form,setForm]=useState({
    name:"Basreng Kaffir Jeruk Purut",
    desc:"Camilan bakso goreng super renyah beraroma irisan daun jeruk purut segar dengan limpahan cabai asli dan gurih umami tinggi.",
    characteristics:"Renyah empuk tidak keras, potongan presisi, wangi jeruk melimpah, rasa pedas berlevel tahan 6 bulan.",
    price:"20000",capital:"3000000",targetOmzet:"45000000",
    location:"Bandung, Jawa Barat",
    initialMarket:"Pecinta jajanan pedas instan usia remaja hingga dewasa (15-35 tahun) di media sosial Indonesia.",
    industry:"Food (Culinary & Food)",angle:"FOMO",hook:"Pattern Interrupt",
  });
  const [ugcForm,setUgcForm]=useState({useAutonomous:false,name:'',desc:''});
  const [imgProduct,setImgProduct]=useState(null);
  const [imgModel,setImgModel]=useState(null);
  const [aiResult,setAiResult]=useState('');
  const [loading,setLoading]=useState(false);
  const [loadingMsg,setLoadingMsg]=useState('');
  const [scenes,setScenes]=useState([]);

  useEffect(()=>{
    document.documentElement.setAttribute('data-theme',theme);
    safeSet('veo_theme',theme);
  },[theme]);

  const toggleTheme=()=>setTheme(t=>t==='dark'?'light':'dark');

  const SYSTEM_PROMPTS={
    planner:`Bertindaklah sebagai tim konsultan bisnis, periklanan, dan pertumbuhan elite (Business Strategist, Startup Advisor, Brand Consultant, Digital Marketing Expert, Content Strategist, Growth Hacker, Copywriter Viral, Sales Funnel Specialist, Product Launch Expert, Investor Mindset Coach). Bedah data produk yang dikirimkan user secara brutal, objektif, menggunakan pola pikir investor nyata, bukan motivator. Jika target omzet tidak realistis dengan modal awal atau harga jual, kritik dengan keras di bagian output. Anda WAJIB mematuhi aturan output: hasilkan data dalam format tabel Markdown secara masif untuk bagian-bagian berikut:

BAGIAN 1: ANALISIS BISNIS & DETEKSI INDUSTRI (Auto Category Detection berdasarkan 22 makro & 80 subkategori, penentuan Industry Trope dominan, Tabel Analisis Faktor, dan Tabel SWOT lengkap dengan Matriks Skor 1-10).
BAGIAN 2: BRANDING METRIC & POSITIONING (Tabel minimal 10 nama brand komersial beserta alasannya, penentuan nama terbaik, handle sosmed, Slogan, Story Brand emosional, Positioning, USP).
BAGIAN 3: ARSITEKTUR DESAIN & PROMPT GENERATOR AI (Tabel Elemen Visual: konsep, bentuk, warna, font. Diikuti Prompt AI bahasa Inggris siap pakai untuk PROMPT LOGO AI, PROMPT BANNER AI, PROMPT FOTO PROFIL AI).
BAGIAN 4: DEEP BUYER PERSONA DATABASES (Tabel komparatif minimal 5 Buyer Persona mendetail di Indonesia mencakup: Nama, Umur, Profesi, Penghasilan, Masalah Utama, Ketakutan, Tujuan, Alasan Beli, Trigger, Platform Favorit).
BAGIAN 5: ESTIMASI TARGET FINANSIAL & LEADS BREAKDOWN (Tabel perhitungan matematis omzet tahunan, bulanan, mingguan, harian, jumlah transaksi harian, leads masuk, closing, dan Conversion Rate minimum agar tidak rugi).
BAGIAN 6: ROADMAP INTERAKTIF 12 BULAN (Tabel komprehensif 5 Fase: Validasi, Audiens, Monetisasi, Scale Up, Dominasi dengan kolom Target, KPI, Aktivitas Harian, Risiko, Solusi).
BAGIAN 7: KRITIK KERAS & REALITA PAHIT (Tabel kesalahan fatal, kebiasaan buruk yang harus stop, penyebab gagal, realita pahit pasar Indonesia, dan aktivitas wajib harian non-negosiasi).

FORMAT PENUTUP: KESIMPULAN INVESTOR berupa ringkasan objektif maksimal 1 halaman yang merangkum penilaian realistis apakah target omzet masuk akal, bagian bisnis paling rentan, peluang & ancaman terbesar di pasar Indonesia saat ini, tiga aktivitas dengan ROI tertinggi, dan rencana aksi 7 hari pertama.`,

    calendar:`Hasilkan KALENDER KONTEN VIRAL MINGGU PERTAMA (14 KONTEN UTUH & SIAP PAKAI). Buat tabel Markdown lengkap berisi minimal 14 konten (2 konten per hari, Senin s.d Minggu) dengan kolom: [Hari] | [Platform (TikTok/Reels/Shorts/FB Pro)] | [Ide Konten & Kategori Funnel] | [Marketing Angle] | [Jenis Hook] | [Script Singkat (Five Scene Framework: Hook -> Build Up -> Development -> Peak -> Resolution dengan arahan visual pergerakan kamera logis standar Veo 3.1)] | [Caption Copywriting Tingkat Dewa Siap Pakai] | [CTA Spesifik] | [Hashtag Strategis]. Tulis isi Caption secara lengkap, persuasif, emosional, memicu konversi, langsung siap pakai untuk jualan di pasar Indonesia. Tambahkan Tabel Target KPI Minggu Pertama dan daftar 10 Hook Viral Tambahan siap pakai.`,

    caption:`Hasilkan variasi caption copywriting tingkat dewa siap pakai yang disesuaikan untuk platform TikTok, Instagram Reels, Facebook Pro, dan YouTube Shorts berdasarkan data produk, kategori industri, marketing angle, dan hook style yang dipilih user. Struktur output wajib menyertakan: Baris pertama hook tebal (Pattern Interrupt/Curiosity Gap), bodi penawaran berbasis emosional/kelangkaan (Scarcity), CTA tajam langsung transfer/klik link, dan klaster hashtag strategis. Gunakan bahasa kasual, persuasif, dan sangat relatable dengan target pasar Indonesia. Sajikan perbandingan antar platform dalam format tabel Markdown yang rapi dan mudah dicopy.`,

    generator:`Bertindaklah sebagai Creative Director & Scriptwriter UGC Premium. Hasilkan skrip video komersial terstruktur untuk iklan berdurasi 30-60 detik berdasarkan data produk dan foto yang dikirimkan. Skrip wajib ditulis ke dalam format tabel Five Scene Framework (Scene 1 s.d 5: Hook, Build Up, Development, Peak, Resolution). Kolom tabel harus memisahkan secara ketat:
| Scene & Durasi | Visual & Camera Direction | Audio & Voiceover | On-Screen Text / Subtitle | Imagen Prompt |

PENTING UNTUK PROMPT VISUAL AI (Imagen Prompt): Buat deskripsi visual bahasa Inggris yang kaya dan sangat sinematik yang menunjukkan detail produk dan model (jika ada) memegang atau berinteraksi dengan produk. Tambahkan panduan eksekusi properti syuting di akhir output.`,
  };

  const buildUserPrompt=()=>{
    const ctx=ugcForm.useAutonomous&&ugcForm.name
      ? `Nama Produk: ${ugcForm.name}\nDeskripsi: ${ugcForm.desc}`
      : `Nama Produk: ${form.name}\nDeskripsi: ${form.desc}\nKarakteristik: ${form.characteristics}\nHarga: Rp ${parseInt(form.price).toLocaleString('id')}\nModal: Rp ${parseInt(form.capital).toLocaleString('id')}\nTarget Omzet/Bulan: Rp ${parseInt(form.targetOmzet).toLocaleString('id')}\nLokasi: ${form.location}\nTarget Pasar: ${form.initialMarket}\nKategori Industri: ${form.industry}\nMarketing Angle: ${form.angle}\nHook Style: ${form.hook}`;
    return ctx;
  };

  const buildMessages=()=>{
    const userText=buildUserPrompt();
    const parts=[];
    if(activeTab==='generator'){
      if(imgProduct?.data) parts.push({inlineData:{mimeType:imgProduct.mime,data:imgProduct.data}});
      if(imgModel?.data)   parts.push({inlineData:{mimeType:imgModel.mime,data:imgModel.data}});
    }
    parts.push({text:userText});
    return [{role:'user',parts}];
  };

  const msgInterval=useRef(null);
  const startMsgLoop=(tab)=>{
    const msgs=LOADING_MSGS[tab]||LOADING_MSGS.planner;
    let idx=0;
    setLoadingMsg(msgs[0]);
    msgInterval.current=setInterval(()=>{
      idx=(idx+1)%msgs.length;
      setLoadingMsg(msgs[idx]);
    },2200);
  };

  const generate=async()=>{
    if(!apiKey) return;
    setLoading(true);
    setAiResult('');
    setScenes([]);
    startMsgLoop(activeTab);
    try{
      const payload={
        system_instruction:{parts:[{text:SYSTEM_PROMPTS[activeTab]||SYSTEM_PROMPTS.planner}]},
        contents:buildMessages(),
        generationConfig:{temperature:0.9,maxOutputTokens:8192},
      };
      const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`,{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify(payload),
      });
      if(!res.ok){
        const err=await res.json().catch(()=>({}));
        throw new Error(err?.error?.message||`HTTP ${res.status}`);
      }
      const data=await res.json();
      const text=data?.candidates?.[0]?.content?.parts?.map(p=>p.text||'').join('')||'';
      if(!text) throw new Error('Respons AI kosong. Coba lagi.');
      setAiResult(text);
      if(activeTab==='generator') setScenes(extractScenes(text));
    }catch(err){
      setAiResult(`## ❌ Error\n\n${err.message}\n\n**Pastikan:**\n- API Key Gemini valid dan aktif\n- Koneksi internet stabil\n- Model gemini-2.5-flash tersedia di akun Anda`);
    }finally{
      clearInterval(msgInterval.current);
      setLoading(false);
    }
  };

  return (
    <div style={{display:'flex',height:'100vh',overflow:'hidden'}}>
      <Sidebar form={form} setForm={setForm} apiKey={apiKey} setApiKey={setApiKey} theme={theme} toggleTheme={toggleTheme} activeTab={activeTab} setActiveTab={setActiveTab}/>
      <div className="main-scroll" style={{flex:1,padding:'24px 28px'}}>
        <TabHeader tab={activeTab} form={form} apiKey={apiKey} ugcForm={ugcForm} imgProduct={imgProduct} imgModel={imgModel} onGenerate={generate} loading={loading}/>
        {activeTab==='generator'&&<UGCExtraForm ugcForm={ugcForm} setUgcForm={setUgcForm} imgProduct={imgProduct} setImgProduct={setImgProduct} imgModel={imgModel} setImgModel={setImgModel}/>}
        <OutputArea tab={activeTab} aiResult={aiResult} loading={loading} loadingMsg={loadingMsg} scenes={scenes} ugcForm={ugcForm} form={form}/>
      </div>
    </div>
  );
}

// ─── ERROR BOUNDARY ───────────────────────────────────────────
class ErrorBoundary extends React.Component{
  constructor(p){super(p);this.state={hasError:false,error:null}}
  static getDerivedStateFromError(e){return{hasError:true,error:e}}
  componentDidCatch(e,i){console.error(e,i)}
  handleReset(){
    try{localStorage.clear();}catch{}
    window.location.reload();
  }
  render(){
    if(!this.state.hasError) return this.props.children;
    return (
      <div style={{minHeight:'100vh',background:'#030712',display:'flex',alignItems:'center',justifyContent:'center',padding:24}}>
        <div style={{maxWidth:560,background:'rgba(239,68,68,.08)',border:'1px solid rgba(239,68,68,.3)',borderRadius:20,padding:32,textAlign:'center'}}>
          <div style={{fontSize:48,marginBottom:16}}>⚠️</div>
          <h2 className="grotesk" style={{color:'#f87171',fontSize:'1.3rem',marginBottom:12}}>Aplikasi Mengalami Error</h2>
          <p style={{color:'#94a3b8',fontSize:'.85rem',marginBottom:20,fontFamily:'JetBrains Mono,monospace',background:'rgba(0,0,0,.3)',padding:12,borderRadius:8,textAlign:'left',whiteSpace:'pre-wrap'}}>{this.state.error?.toString()}</p>
          <button onClick={()=>this.handleReset()} className="btn btn-cyan" style={{margin:'0 auto'}}>🔄 Reset & Muat Ulang</button>
        </div>
      </div>
    );
  }
}

// ─── MOUNT ────────────────────────────────────────────────────
const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(
  <ErrorBoundary>
    <AppContent/>
  </ErrorBoundary>
);
</script>
</body>
</html>
