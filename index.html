<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VEO 3 PRO STUDIO - Premium UGC Suite</title>
    
    <!-- Pustaka Utama Berbasis CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* Antisipasi Layar Putih: Paksa styling dasar langsung aktif sebelum React render */
        body { 
            background-color: #f8fafc !important; 
            color: #0f172a !important; 
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            margin: 0;
            padding: 0;
        }
    </style>
</head>
<body>
    <div id="root">
        <!-- Fallback loader visual jika React gagal/telat me-render -->
        <div id="fallback-loader" style="display: flex; flex-direction: column; justify-content: center; items-center: center; height: 100vh; text-align: center; font-family: sans-serif; color: #64748b;">
            <h2 style="color: #0ea5e9; margin-bottom: 8px;">VEO 3 PRO STUDIO</h2>
            <p style="font-size: 14px;">Memuat Sistem Engine AI...</p>
        </div>
    </div>

    <script type="text/babel">
        // --- AMANKAN COMPONENT UTAMA REACT ---
        const { useState, useEffect, useRef, useMemo } = React;

        // Antisipasi Error Lucide: Jika CDN lambat, buat objek pengganti agar aplikasi tidak blank
        const icons = window.lucide || {};
        const SafeIcon = ({ name, className = "w-4 h-4", ...props }) => {
            useEffect(() => {
                if (window.lucide && typeof window.lucide.createIcons === 'function') {
                    window.lucide.createIcons();
                }
            });
            // Gunakan elemen bentukan jika komponen ikon siap, jika tidak gunakan span kosong
            const TargetIcon = icons[name];
            if (TargetIcon) {
                return <TargetIcon className={className} {...props} />;
            }
            return <span className={`inline-block border border-current rounded-sm ${className}`} style={{ opacity: 0.5 }}></span>;
        };

        // --- DATABASES ---
        const INDUSTRY_CATEGORIES = [
          { value: "food", label: "Culinary & Food (Kuliner Maknyus)" },
          { value: "beverage", label: "Beverage & Drinks (Minuman Kekinian)" },
          { value: "fashion", label: "Fashion & Apparel (Gaya & Busana)" },
          { value: "beauty", label: "Beauty & Skincare (Kecantikan & Kulit)" },
          { value: "healthcare", label: "Healthcare & Wellness (Kesehatan)" },
          { value: "saas_tech", label: "SaaS & Software Technology" },
          { value: "local_umkm", label: "Local UMKM & Handcrafts" }
        ];

        const MARKETING_ANGLES = [
          { value: "FOMO", label: "FOMO (Takut Ketinggalan Trend)" },
          { value: "Social Proof", label: "Social Proof (Rekomendasi Massal)" },
          { value: "Authority", label: "Authority (Edukasi Ilmiah/Ahli)" },
          { value: "Transformation", label: "Transformation (Sebelum vs Sesudah)" }
        ];

        const VIRAL_HOOK_STYLES = [
          { value: "Pattern Interrupt", label: "Pattern Interrupt (Stop Jari 1 Detik)" },
          { value: "Curiosity Gap", label: "Curiosity Gap (Memicu Penasaran)" },
          { value: "Bold Claim", label: "Bold Claim (Klaim Berani)" }
        ];

        // --- PARSER MARKDOWN ---
        const parseMarkdownToReact = (text, onCopy) => {
          if (!text) return null;
          const lines = text.split('\n');
          const elements = [];
          let currentTableHeaders = [];
          let currentTableRows = [];
          let inTable = false;
          let codeBlock = [];
          let inCode = false;

          for (let i = 0; i < lines.length; i++) {
            const line = lines[i].trim();

            if (line.startsWith('```')) {
              if (inCode) {
                const codeText = codeBlock.join('\n');
                elements.push(
                  <div key={`code-${i}`} className="relative my-4 p-4 bg-slate-950 border border-purple-500/30 rounded-lg group">
                    <button 
                      onClick={() => onCopy(codeText)} 
                      className="absolute top-2 right-2 p-1.5 bg-slate-800 hover:bg-cyan-500/20 text-slate-400 hover:text-cyan-400 rounded transition duration-200"
                    >
                      <SafeIcon className="w-4 h-4" name="Copy"/>
                    </button>
                    <pre className="text-xs font-mono text-purple-300 overflow-x-auto whitespace-pre-wrap">{codeText}</pre>
                  </div>
                );
                codeBlock = [];
                inCode = false;
              } else {
                inCode = true;
              }
              continue;
            }

            if (inCode) {
              codeBlock.push(lines[i]);
              continue;
            }

            if (line.startsWith('|')) {
              inTable = true;
              const cells = line.split('|').map(cell => cell.trim()).filter((_, idx, arr) => idx > 0 && idx < arr.length - 1);
              const isDivider = cells.every(cell => cell.startsWith('-') || (cell.startsWith(':') && cell.endsWith(':')));
              if (isDivider) continue;

              if (currentTableHeaders.length === 0) {
                currentTableHeaders = cells;
              } else {
                currentTableRows.push(cells);
              }
              continue;
            } else {
              if (inTable && currentTableHeaders.length > 0) {
                elements.push(
                  <div key={`table-${i}`} className="overflow-x-auto my-6 border border-cyan-500/30 rounded-xl shadow-lg">
                    <table className="min-w-full divide-y divide-cyan-500/20 text-sm bg-slate-900/60 text-white">
                      <thead className="bg-gradient-to-r from-slate-900 to-indigo-950 text-cyan-300">
                        <tr>
                          {currentTableHeaders.map((hdr, hIdx) => <th key={hIdx} className="px-4 py-3 text-left text-xs uppercase font-bold">{hdr}</th>)}
                        </tr>
                      </thead>
                      <tbody className="divide-y divide-slate-800">
                        {currentTableRows.map((row, rIdx) => (
                          <tr key={rIdx} className="hover:bg-slate-800/50">
                            {row.map((cell, cIdx) => <td key={cIdx} className="px-4 py-3 text-xs md:text-sm">{cell}</td>)}
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                );
                currentTableHeaders = [];
                currentTableRows = [];
                inTable = false;
              }
            }

            if (line.startsWith('###')) {
              elements.push(
                <h4 key={i} className="text-md md:text-lg font-bold text-cyan-500 dark:text-cyan-400 mt-6 mb-3 border-l-4 border-cyan-500 pl-3 flex items-center gap-2">
                  <SafeIcon className="w-4.5 h-4.5 text-cyan-500 shrink-0" name="Sparkles"/>
                  {line.replace('###', '').trim()}
                </h4>
              );
              continue;
            }
            if (line.startsWith('##') || line.startsWith('#')) {
              elements.push(
                <h3 key={i} className="text-lg md:text-xl font-black text-transparent bg-clip-text bg-gradient-to-r from-cyan-600 to-purple-600 dark:from-cyan-400 dark:to-purple-400 mt-8 mb-4 border-b border-slate-200 dark:border-cyan-950 pb-2">
                  {line.replace(/^#+\s*/, '').trim()}
                </h3>
              );
              continue;
            }

            if (line.startsWith('-') || line.startsWith('*')) {
              elements.push(
                <div key={i} className="flex items-start gap-2 my-1.5 text-sm pl-4 text-slate-600 dark:text-slate-300">
                  <span className="text-cyan-500 font-extrabold mt-1">•</span>
                  <span>{line.replace(/^[-*]\s*/, '').trim()}</span>
                </div>
              );
              continue;
            }

            if (line === '') continue;

            elements.push(<p key={i} className="text-sm md:text-base text-slate-700 dark:text-slate-300 leading-relaxed my-2">{line}</p>);
          }
          return <div className="space-y-1">{elements}</div>;
        };

        // --- FIVE SCENE VISUALIZATION ---
        const FiveSceneStoryboard = ({ rawText }) => {
          const scenes = useMemo(() => {
            const parsed = [];
            const labels = ["HOOK", "BUILD UP", "DEVELOPMENT", "PEAK", "RESOLUTION"];
            for (let i = 1; i <= 5; i++) {
              parsed.push({
                sceneNum: i,
                label: labels[i-1],
                duration: i === 1 ? "3s" : "5s",
                visual: `Kamera dinamis menyorot pergerakan detail produk/model secara sinematik.`,
                audio: `Menyuarakan dialog persuasif yang menghentikan aktivitas geser layar audiens.`,
                subtitle: `Dapatkan Penawaran Khusus Sekarang Juga!`
              });
            }
            return parsed;
          }, [rawText]);

          return (
            <div className="space-y-4 my-6">
              <div className="flex items-center gap-2">
                <SafeIcon className="w-5 h-5 text-purple-500 animate-pulse" name="Video"/>
                <h4 className="text-xs md:text-sm font-bold uppercase tracking-wider text-slate-700 dark:text-slate-200">Five Scene Framework Storyboard</h4>
              </div>
              <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-3">
                {scenes.map((scene, idx) => (
                  <div key={idx} className="border border-slate-200 dark:border-slate-800 rounded-xl p-3 bg-white dark:bg-slate-900/60 shadow-sm text-xs">
                    <div className="flex justify-between items-center border-b border-slate-100 dark:border-slate-800 pb-1.5 mb-2">
                      <span className="font-bold text-cyan-600 dark:text-cyan-400">{scene.sceneNum}. {scene.label}</span>
                      <span className="text-[10px] px-1.5 py-0.5 rounded bg-slate-100 dark:bg-slate-800 font-mono">{scene.duration}</span>
                    </div>
                    <p className="text-[11px] text-slate-600 dark:text-slate-400 mb-1"><strong>Visual:</strong> {scene.visual}</p>
                    <p className="text-[11px] text-slate-600 dark:text-slate-400"><strong>Audio:</strong> {scene.audio}</p>
                  </div>
                ))}
              </div>
            </div>
          );
        };

        // --- APP COMPONENT ---
        function App() {
          const [apiKey, setApiKey] = useState(() => localStorage.getItem('veo_studio_apikey') || '');
          const [showApiKey, setShowApiKey] = useState(false);
          const [isDarkMode, setIsDarkMode] = useState(false); // DEFAULT TERANG (WHITE)

          const [formData, setFormData] = useState({
            name: 'Basreng Kaffir Jeruk Purut',
            desc: 'Camilan bakso goreng super renyah beraroma irisan daun jeruk purut segar dengan limpahan cabai asli.',
            characteristics: 'Potongan tipis krispi, daun jeruk melimpah, pedas nampol.',
            price: '15000',
            capital: '1500000',
            targetOmzet: '20000000',
            location: 'Bandung',
            initialMarket: 'Remaja dan Mahasiswa pedas lovers',
            industryCategory: 'food',
            marketingAngle: 'FOMO',
            viralHookStyle: 'Pattern Interrupt'
          });

          const [activeTab, setActiveTab] = useState('planner');
          const [isLoading, setIsLoading] = useState(false);
          const [outputs, setOutputs] = useState({ planner: '', calendar: '', caption: '', generator: '' });
          const [isCopied, setIsCopied] = useState(false);

          useEffect(() => {
            // Hilangkan fallback-loader bawaan HTML murni begitu React siap pasang komponen
            const loader = document.getElementById('fallback-loader');
            if (loader) loader.remove();
          }, []);

          const handleSaveApiKey = (key) => {
            setApiKey(key);
            localStorage.setItem('veo_studio_apikey', key);
          };

          const copyToClipboard = (text) => {
            navigator.clipboard.writeText(text);
            setIsCopied(true);
            setTimeout(() => setIsCopied(false), 2000);
          };

          const executeAction = async () => {
            if (!apiKey) return;
            setIsLoading(true);
            try {
              const apiUrl = `[https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=$](https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=$){apiKey}`;
              const response = await fetch(apiUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  contents: [{ parts: [{ text: `Bertindaklah sebagai Konsultan Bisnis & UGC Creator Makro. Berikan analisis mendalam, strategi konten komersial terstruktur, ide skrip video, strategi konversi penjualan berdasarkan parameter produk ini: ${JSON.stringify(formData)}. Format output wajib menggunakan penulisan Markdown rapi.` }] }]
                })
              });
              const data = await response.json();
              const text = data?.candidates?.[0]?.content?.parts?.[0]?.text || "Gagal menghasilkan konten.";
              setOutputs(prev => ({ ...prev, [activeTab]: text }));
            } catch (err) {
              setOutputs(prev => ({ ...prev, [activeTab]: `Eror sistem API: ${err.message}` }));
            } finally {
              setIsLoading(false);
            }
          };

          return (
            <div className={`min-h-screen flex flex-col transition-colors duration-200 ${isDarkMode ? 'bg-slate-950 text-slate-100' : 'bg-slate-50 text-slate-900'}`}>
              
              {/* TOP BAR */}
              <header className={`border-b sticky top-0 z-40 px-4 py-3 transition-colors ${isDarkMode ? 'bg-slate-900/90 border-slate-800' : 'bg-white/95 border-slate-200 shadow-sm'}`}>
                <div className="max-w-7xl mx-auto flex justify-between items-center">
                  <div className="flex items-center gap-2">
                    <SafeIcon className="w-5 h-5 text-cyan-500" name="Flame"/>
                    <div>
                      <h1 className="text-base md:text-lg font-black tracking-wide uppercase bg-gradient-to-r from-cyan-600 to-indigo-600 dark:from-cyan-400 dark:to-purple-400 bg-clip-text text-transparent">VEO 3 PRO STUDIO</h1>
                      <p className="text-[9px] font-mono text-slate-400 uppercase tracking-widest">Premium UGC Suite & Business Architect</p>
                    </div>
                  </div>
                  <button 
                    onClick={() => setIsDarkMode(!isDarkMode)}
                    className={`p-2 rounded-xl border text-xs flex items-center gap-1 ${isDarkMode ? 'bg-slate-800 border-slate-700 text-yellow-400' : 'bg-slate-100 border-slate-200 text-slate-700'}`}
                  >
                    <SafeIcon "Moon"} "Sun" : ? className="w-3.5 h-3.5" name="{isDarkMode"/>
                    <span className="hidden sm:inline">{isDarkMode ? "Mode Terang" : "Mode Gelap"}</span>
                  </button>
                </div>
              </header>

              {/* CORE DASHBOARD CONTAINER */}
              <main className="max-w-7xl w-full mx-auto p-4 md:p-6 grid grid-cols-1 lg:grid-cols-12 gap-6 flex-grow">
                
                {/* LEFT CONTROL SIDEBAR */}
                <aside className="lg:col-span-4 space-y-4">
                  {/* API KEY CARD */}
                  <div className={`p-4 rounded-2xl border ${isDarkMode ? 'bg-slate-900 border-slate-800' : 'bg-white border-slate-200 shadow-sm'}`}>
                    <label className="text-[10px] font-bold uppercase tracking-wider text-slate-400 block mb-2">Google Gemini API Key</label>
                    <div className="relative flex items-center">
                      <input 
                        type={showApiKey ? "text" : "password"} 
                        placeholder="Masukkan AIzaSy..." 
                        value={apiKey} 
                        onChange={(e) => handleSaveApiKey(e.target.value)}
                        className={`w-full border rounded-xl pl-3 pr-10 py-1.5 text-xs font-mono focus:outline-none focus:border-cyan-500 ${isDarkMode ? 'bg-slate-950 border-slate-800 text-cyan-400' : 'bg-slate-50 border-slate-200 text-slate-800'}`}
                      />
                      <button onClick={() => setShowApiKey(!showApiKey)} className="absolute right-3 text-slate-400 hover:text-cyan-500">
                        <SafeIcon "Eye"} "EyeOff" : ? className="w-3.5 h-3.5" name="{showApiKey"/>
                      </button>
                    </div>
                  </div>

                  {/* FORM PARAMETER */}
                  <div className={`p-4 rounded-2xl border space-y-3 ${isDarkMode ? 'bg-slate-900 border-slate-800' : 'bg-white border-slate-200 shadow-sm'}`}>
                    <div className="border-b border-slate-100 dark:border-slate-800 pb-2"><h3 className="text-xs font-bold uppercase tracking-wider text-slate-400">Parameter Bisnis Global</h3></div>
                    
                    <div>
                      <label className="text-[9px] font-bold text-slate-400 uppercase">Nama Produk</label>
                      <input type="text" value={formData.name} onChange={(e) => setFormData({...formData, name: e.target.value})} className={`w-full border rounded-lg p-2 text-xs focus:outline-none ${isDarkMode ? 'bg-slate-950 border-slate-800' : 'bg-slate-50 border-slate-200'}`} />
                    </div>
                    <div>
                      <label className="text-[9px] font-bold text-slate-400 uppercase">Deskripsi Produk</label>
                      <textarea rows={2} value={formData.desc} onChange={(e) => setFormData({...formData, desc: e.target.value})} className={`w-full border rounded-lg p-2 text-xs focus:outline-none ${isDarkMode ? 'bg-slate-950 border-slate-800' : 'bg-slate-50 border-slate-200'}`} />
                    </div>

                    <div className="grid grid-cols-2 gap-2">
                      <div>
                        <label className="text-[9px] font-bold text-slate-400 uppercase">Harga Jual (Rp)</label>
                        <input type="number" value={formData.price} onChange={(e) => setFormData({...formData, price: e.target.value})} className={`w-full border rounded-lg p-2 text-xs focus:outline-none ${isDarkMode ? 'bg-slate-950 border-slate-800' : 'bg-slate-50 border-slate-200'}`} />
                      </div>
                      <div>
                        <label className="text-[9px] font-bold text-slate-400 uppercase">Target Omzet (Rp)</label>
                        <input type="number" value={formData.targetOmzet} onChange={(e) => setFormData({...formData, targetOmzet: e.target.value})} className={`w-full border rounded-lg p-2 text-xs focus:outline-none ${isDarkMode ? 'bg-slate-950 border-slate-800' : 'bg-slate-50 border-slate-200'}`} />
                      </div>
                    </div>

                    <div>
                      <label className="text-[9px] font-bold text-slate-400 uppercase">Kategori Makro</label>
                      <select value={formData.industryCategory} onChange={(e) => setFormData({...formData, industryCategory: e.target.value})} className={`w-full border rounded-lg p-2 text-xs focus:outline-none ${isDarkMode ? 'bg-slate-950 border-slate-800' : 'bg-slate-50 border-slate-200'}`}>
                        {INDUSTRY_CATEGORIES.map(c => <option key={c.value} value={c.value}>{c.label}</option>)}
                      </select>
                    </div>
                  </div>
                </aside>

                {/* RIGHT CONSOLE WORKSPACE */}
                <section className="lg:col-span-8 flex flex-col space-y-4">
                  {/* TAB MENU */}
                  <div className={`p-1.5 rounded-xl border flex gap-1 ${isDarkMode ? 'bg-slate-900 border-slate-800' : 'bg-white border-slate-200 shadow-sm'}`}>
                    {['planner', 'calendar', 'caption', 'generator'].map((tab) => (
                      <button 
                        key={tab} 
                        onClick={() => setActiveTab(tab)} 
                        className={`flex-1 py-2 text-center text-xs font-bold uppercase tracking-wider rounded-lg transition ${activeTab === tab ? 'bg-cyan-500/10 text-cyan-600 dark:text-cyan-400 border border-cyan-500/20' : 'text-slate-400 hover:text-slate-600'}`}
                      >
                        {tab}
                      </button>
                    ))}
                  </div>

                  {/* MAIN CONSOLE SCREEN */}
                  <div className={`p-5 rounded-2xl border min-h-[350px] flex flex-col justify-between ${isDarkMode ? 'bg-slate-900/40 border-slate-850' : 'bg-white border-slate-200 shadow-sm'}`}>
                    <div>
                      <div className="flex justify-between items-center border-b border-slate-100 dark:border-slate-800 pb-3 mb-4">
                        <span className="text-xs font-bold uppercase tracking-wider text-slate-400 flex items-center gap-1.5"><span className="w-2 h-2 rounded-full bg-cyan-500"></span> Output Panel ({activeTab})</span>
                        {outputs[activeTab] && (
                          <button onClick={() => copyToClipboard(outputs[activeTab])} className="text-xs font-semibold px-2.5 py-1 bg-slate-100 dark:bg-slate-800 rounded-lg text-slate-600 dark:text-slate-300 hover:bg-cyan-500/10 flex items-center gap-1">
                            <SafeIcon "Check" "Copy"} : ? className="w-3 h-3" name="{isCopied"/> {isCopied ? "Tersalin!" : "Salin"}
                          </button>
                        )}
                      </div>

                      <div className="output-content">
                        {isLoading ? (
                          <div className="py-16 text-center space-y-2">
                            <div className="w-8 h-8 border-4 border-cyan-500 border-t-transparent rounded-full animate-spin mx-auto"></div>
                            <p className="text-xs font-mono text-cyan-600 dark:text-cyan-400 animate-pulse uppercase tracking-wider">Engine AI Memproses Formula Strategis...</p>
                          </div>
                        ) : outputs[activeTab] ? (
                          <div>
                            {activeTab === 'generator' && <FiveSceneStoryboard rawText="{outputs[activeTab]}"/>}
                            {parseMarkdownToReact(outputs[activeTab], copyToClipboard)}
                          </div>
                        ) : (
                          <div className="py-16 text-center text-slate-400 space-y-1">
                            <SafeIcon className="w-8 h-8 mx-auto text-slate-300" name="Sparkles"/>
                            <p className="text-xs font-bold uppercase">Konsol Siap Dioperasikan</p>
                            <p className="text-[11px] max-w-xs mx-auto">Input parameter produk di panel kiri, pastikan API Key terisi, lalu klik tombol jalankan AI.</p>
                          </div>
                        )}
                      </div>
                    </div>

                    <div className="pt-4 mt-6 border-t border-slate-100 dark:border-slate-800">
                      <button 
                        onClick={executeAction} 
                        disabled={isLoading || !apiKey}
                        className={`w-full py-3 rounded-xl font-bold text-xs uppercase tracking-widest text-white transition ${!apiKey ? 'bg-slate-300 dark:bg-slate-800 text-slate-400 cursor-not-allowed' : 'bg-gradient-to-r from-cyan-500 to-indigo-600 hover:shadow-md hover:brightness-105'}`}
                      >
                        Jalankan Solusi AI
                      </button>
                    </div>
                  </div>
                </section>
              </main>

              <footer className="py-4 text-center text-[10px] font-mono border-t border-slate-200 dark:border-slate-900 text-slate-400">
                <p>© 2026 Veo 3 Pro Studio Suite. Berbasis Client-Side Aman Tanpa Server Pihak Ketiga.</p>
              </footer>
            </div>
          );
        }

        // --- RENDER BOOTSTRAP ---
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App/>);
    </script>
</body>
</html>
