<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>Veo 3 Pro Studio</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#030712;--bg2:#0d1117;--card:#111827;--card2:#161f2e;
  --border:#1f2937;--cyan:#06b6d4;--purple:#a855f7;--pink:#ec4899;
  --green:#10b981;--yellow:#f59e0b;--red:#ef4444;
  --txt:#f1f5f9;--txt2:#94a3b8;--txm:#475569;
  --sw:300px;--bnav:64px;
}
[data-theme="light"]{
  --bg:#f0f4f8;--bg2:#e2e8f0;--card:#fff;--card2:#f8fafc;
  --border:#cbd5e1;--txt:#0f172a;--txt2:#334155;--txm:#64748b;
}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:'Inter',sans-serif;overflow:hidden}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:#334155;border-radius:2px}
.mono{font-family:'JetBrains Mono',monospace}
.gsk{font-family:'Space Grotesk',sans-serif}
.grad{background:linear-gradient(135deg,var(--cyan),var(--purple),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.glass{background:rgba(17,24,39,.75);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.06)}
[data-theme="light"] .glass{background:rgba(255,255,255,.85);border-color:rgba(0,0,0,.08)}

/* LAYOUT */
.layout{display:flex;height:100vh;overflow:hidden;position:relative}
.sidebar{
  width:var(--sw);flex-shrink:0;background:var(--bg2);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  height:100vh;overflow-y:auto;
  transition:transform .3s ease;
  z-index:100;
}
.main{flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden}
.main-body{flex:1;overflow-y:auto;padding:20px 24px}

/* MOBILE */
@media(max-width:768px){
  .sidebar{
    position:fixed;top:0;left:0;height:100vh;
    transform:translateX(-100%);
  }
  .sidebar.open{transform:translateX(0);box-shadow:4px 0 30px rgba(0,0,0,.5)}
  .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:99}
  .sidebar-overlay.show{display:block}
  .main{padding-bottom:var(--bnav)}
  .main-body{padding:14px 14px calc(var(--bnav) + 14px)}
  .bottom-nav{display:flex !important}
  .desk-topbar{display:flex !important}
}
@media(min-width:769px){
  .bottom-nav{display:none !important}
  .hamburger{display:none !important}
  .desk-topbar{display:none}
}

/* BOTTOM NAV */
.bottom-nav{
  display:none;
  position:fixed;bottom:0;left:0;right:0;
  height:var(--bnav);background:var(--card);
  border-top:1px solid var(--border);
  z-index:200;
}
.bnav-item{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:3px;cursor:pointer;
  color:var(--txm);font-size:.6rem;font-weight:600;
  transition:.2s;padding:4px;
  border:none;background:transparent;
}
.bnav-item.active{color:var(--cyan)}
.bnav-item svg{width:20px;height:20px}

/* DESK TOPBAR (mobile only) */
.desk-topbar{
  display:none;align-items:center;
  padding:10px 14px;background:var(--bg2);
  border-bottom:1px solid var(--border);gap:10px;
  flex-shrink:0;
}

/* SIDEBAR ITEMS */
.slink{
  display:flex;align-items:center;gap:10px;
  padding:9px 13px;border-radius:10px;cursor:pointer;
  transition:.2s;color:var(--txt2);font-size:.83rem;font-weight:500;
  border:1px solid transparent;
}
.slink:hover{background:rgba(6,182,212,.08);color:var(--cyan);border-color:rgba(6,182,212,.15)}
.slink.active{background:linear-gradient(135deg,rgba(6,182,212,.15),rgba(168,85,247,.1));color:var(--cyan);border-color:rgba(6,182,212,.25)}

/* INPUTS */
.inp{
  width:100%;padding:8px 12px;border-radius:8px;
  border:1px solid var(--border);background:var(--bg2);
  color:var(--txt);font-size:.82rem;outline:none;
  transition:.2s;font-family:'Inter',sans-serif;
}
.inp:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(6,182,212,.1)}
.inp::placeholder{color:var(--txm)}
textarea.inp{resize:vertical;min-height:72px}
select.inp option{background:var(--card)}

/* BUTTONS */
.btn{
  padding:8px 16px;border-radius:8px;font-size:.8rem;
  font-weight:600;cursor:pointer;transition:.2s;border:none;
  display:inline-flex;align-items:center;gap:6px;
}
.btn-c{background:linear-gradient(135deg,#0891b2,#6d28d9);color:#fff}
.btn-c:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 6px 20px rgba(6,182,212,.3)}
.btn-c:disabled{opacity:.4;cursor:not-allowed}
.btn-g{background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--txt2)}
.btn-g:hover{border-color:var(--cyan);color:var(--cyan)}
.btn-r{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.25);color:#f87171}
.btn-r:hover{background:rgba(239,68,68,.2)}
.btn-sm{padding:4px 10px;font-size:.72rem}

/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:16px}
.card2{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:12px}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 9px;border-radius:999px;font-size:.68rem;font-weight:600}
.b-g{background:rgba(16,185,129,.12);color:#34d399;border:1px solid rgba(16,185,129,.2)}
.b-y{background:rgba(245,158,11,.12);color:#fbbf24;border:1px solid rgba(245,158,11,.2)}
.b-r{background:rgba(239,68,68,.12);color:#f87171;border:1px solid rgba(239,68,68,.2)}
.b-c{background:rgba(6,182,212,.12);color:var(--cyan);border:1px solid rgba(6,182,212,.2)}
.b-p{background:rgba(168,85,247,.12);color:#c084fc;border:1px solid rgba(168,85,247,.2)}

/* PROGRESS */
.pbar{height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.pfill{height:100%;background:linear-gradient(90deg,var(--cyan),var(--purple));border-radius:3px;transition:width .4s}

/* ANIMATIONS */
.spin{animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.pulse{animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* UPLOAD */
.upbox{
  border:2px dashed var(--border);border-radius:10px;
  padding:20px;text-align:center;cursor:pointer;transition:.2s;
}
.upbox:hover{border-color:var(--cyan);background:rgba(6,182,212,.04)}

/* SCENE CARDS */
.scard{
  background:linear-gradient(135deg,var(--card),var(--card2));
  border:1px solid var(--border);border-radius:13px;
  overflow:hidden;transition:.25s;
}
.scard:hover{border-color:var(--cyan);transform:translateY(-2px);box-shadow:0 8px 28px rgba(6,182,212,.1)}

/* IMAGE DISPLAY */
.ai-img{width:100%;border-radius:8px;display:block;border:1px solid var(--border)}
.img-placeholder{
  width:100%;aspect-ratio:1;border-radius:8px;
  background:linear-gradient(135deg,var(--card2),var(--card));
  border:1px solid var(--border);display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:8px;color:var(--txm);
  font-size:.75rem;text-align:center;padding:12px;
}

/* MARKDOWN TABLES */
.mdwrap{overflow-x:auto;margin-bottom:14px;border-radius:10px}
.mdt{width:100%;border-collapse:collapse;font-size:.78rem}
.mdt th{background:linear-gradient(135deg,rgba(6,182,212,.14),rgba(168,85,247,.08));color:var(--cyan);padding:9px 11px;text-align:left;border:1px solid rgba(6,182,212,.18);font-weight:600;white-space:nowrap}
.mdt td{padding:7px 11px;border:1px solid var(--border);color:var(--txt2);vertical-align:top;min-width:80px}
.mdt tr:nth-child(even) td{background:rgba(255,255,255,.018)}
.mdt tr:hover td{background:rgba(6,182,212,.03)}

/* COPY TOAST */
.toast{
  position:fixed;bottom:80px;right:16px;
  background:#10b981;color:#fff;padding:8px 16px;
  border-radius:8px;font-size:.8rem;font-weight:600;
  z-index:9999;animation:toast .3s ease;
}
@media(min-width:769px){.toast{bottom:20px;right:20px}}
@keyframes toast{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}

/* COPY PROMPT BOX */
.prompt-box{
  background:rgba(6,182,212,.05);
  border:1px solid rgba(6,182,212,.18);
  border-radius:9px;padding:10px 12px;margin-top:8px;
}
.prompt-text{
  font-family:'JetBrains Mono',monospace;
  font-size:.73rem;color:var(--txt2);line-height:1.6;
  word-break:break-word;
}

/* CAROUSEL SLIDES */
.carousel-wrap{display:flex;gap:12px;overflow-x:auto;padding-bottom:8px}
.carousel-wrap::-webkit-scrollbar{height:4px}
.cslide{flex-shrink:0;width:240px;background:var(--card2);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.cslide-img{width:100%;aspect-ratio:1;object-fit:cover;display:block}
.cslide-info{padding:10px}

/* GRADIENT THEMES */
.gt-cyber{background:linear-gradient(135deg,#0f0c29,#302b63)}
.gt-vapor{background:linear-gradient(135deg,#1a0533,#2d1b69)}
.gt-emerald{background:linear-gradient(135deg,#0d1b2a,#1b4332)}
.gt-dark{background:linear-gradient(135deg,#0a0a0a,#1a1a2e)}
.gt-corp{background:linear-gradient(135deg,#1e3a5f,#0f172a)}
.gt-rose{background:linear-gradient(135deg,#1a0010,#3d0024)}
</style>
</head>

  moon:<Ic d={<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>}/>,

  trash:<Ic d={<><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></>}/>,

};

/* ── CONSTANTS ── */
const INDUSTRIES=["Food (Culinary & Food)","Beverage","Fashion","Beauty","Healthcare","SaaS/Tech","Local UMKM","Mother/Baby","Gadgets","Education","Automotive","Travel","Finance","Real Estate","Pets","Home Living","Sports","Gaming","Event Organizer","Agency/B2B","Agriculture","Logistics"];
const ANGLES=["FOMO","Aspirational","Social Proof","Authority","Scarcity","Convenience","Transformation"];

const LOADING_MSGS={
  planner:["Konsultan Bisnis merumuskan brand...","Menganalisis pasar Indonesia...","Menyusun roadmap 12 bulan...","Menghitung proyeksi finansial...","Memvalidasi strategi kompetitor..."],

const SCENE_META=[

  {label:"Build Up",color:"#f59e0b",icon:"📈",cam:"MEDIUM SHOT / TRACKING",grad:"linear-gradient(135deg,#451a03,#78350f)"},
  {label:"Development",color:"#06b6d4",icon:"🎬",cam:"WIDE / ESTABLISHING",grad:"linear-gradient(135deg,#083344,#164e63)"},
  {label:"Peak",color:"#a855f7",icon:"✨",cam:"SLOW-MO / DOLLY",grad:"linear-gradient(135deg,#2e1065,#4a1d96)"},

/* ── UTILS ── */
function safeGet(k,d=""){try{return localStorage.getItem(k)??d}catch{return d}}
function safeSet(k,v){try{localStorage.setItem(k,v)}catch{}}

function calcSanity(cap,price,tgt){
  const c=parseFloat(cap)||0,p=parseFloat(price)||1,t=parseFloat(tgt)||1;
  const ratio=c/t,qty=t/p,traffic=qty/0.025;
  let score,label,cls;
  if(ratio<0.05){score=40;label="Risiko Tinggi — Modal Minim";cls="b-r"}
  else if(ratio<0.15){score=75;label="Menantang — Perlu Efisiensi Organik";cls="b-y"}
  else{score=95;label="Sehat — Modal Cukup";cls="b-g"}
  return{score,label,cls,qty:Math.ceil(qty),traffic:Math.ceil(traffic),ratio:(ratio*100).toFixed(1)};
}

/* ── MARKDOWN PARSER ── */
function MdRender({text,onCopyPrompt}){
  if(!text) return null;
  const lines=text.split('\n');
  const out=[];
  let trows=[],inT=false,i=0;

  function flushT(){
    if(!trows.length)return;
    const hds=trows[0],body=trows.slice(1);
    out.push(
      <div key={`tw${i}`} className="mdwrap">
        <table className="mdt">
          <thead><tr>{hds.map((h,hi)=><th key={hi}>{h.trim()}</th>)}</tr></thead>
          <tbody>{body.map((row,ri)=>(
            <tr key={ri}>{row.map((cell,ci)=>{
              const html=cell.trim()
                .replace(/\*\*(.*?)\*\*/g,'<strong style="color:var(--cyan)">$1</strong>')
                .replace(/`(.*?)`/g,'<code style="background:rgba(6,182,212,.1);padding:1px 4px;border-radius:3px;font-family:monospace;font-size:.75em">$1</code>');
              return <td key={ci}><span dangerouslySetInnerHTML={{__html:html}}/></td>;
            })}</tr>
          ))}</tbody>
        </table>
      </div>
    );
    trows=[];
  }

  while(i<lines.length){
    const line=lines[i],tr=line.trim();
    if(tr.startsWith('|')){
      const cols=tr.split('|').filter((_,idx,a)=>idx>0&&idx<a.length-1);
      if(cols.every(c=>/^[-:\s]+$/.test(c))){i++;continue;}
      if(!inT)inT=true;
      trows.push(cols);i++;continue;
    }else if(inT){inT=false;flushT();}

    // detect prompt blocks for copy
    const isPrompt=tr.toLowerCase().includes('prompt')&&tr.length>30&&!tr.startsWith('#')&&!tr.startsWith('|');

    if(/^### /.test(tr)){
      out.push(<h3 key={i} className="gsk grad" style={{fontSize:'.95rem',fontWeight:700,marginTop:18,marginBottom:7}}>{tr.slice(4)}</h3>);
    }else if(/^## /.test(tr)){
      out.push(<h2 key={i} className="gsk" style={{fontSize:'1.08rem',fontWeight:700,marginTop:22,marginBottom:9,color:'var(--cyan)',borderBottom:'1px solid rgba(6,182,212,.2)',paddingBottom:5}}>{tr.slice(3)}</h2>);
    }else if(/^# /.test(tr)){
      out.push(<h1 key={i} className="gsk grad" style={{fontSize:'1.3rem',fontWeight:800,marginTop:24,marginBottom:10}}>{tr.slice(2)}</h1>);
    }else if(/^[-*] /.test(tr)){
      const content=tr.slice(2);
      const hasPromptKw=content.toLowerCase().includes('prompt')&&content.length>40;
      out.push(
        <div key={i} style={{display:'flex',gap:8,marginBottom:4,paddingLeft:6}}>
          <span style={{color:'var(--cyan)',marginTop:2,flexShrink:0}}>▸</span>
          <div style={{flex:1}}>
            <span style={{color:'var(--txt2)',fontSize:'.82rem'}} dangerouslySetInnerHTML={{__html:content.replace(/\*\*(.*?)\*\*/g,'<strong style="color:var(--txt)">$1</strong>')}}/>
            {hasPromptKw&&onCopyPrompt&&<CopyBtn text={content} onCopy={onCopyPrompt}/>}
          </div>
        </div>
      );
    }else if(/^\d+\. /.test(tr)){
      out.push(<div key={i} style={{display:'flex',gap:8,marginBottom:4,paddingLeft:6}}><span style={{color:'var(--purple)',minWidth:18,fontSize:'.78rem',fontWeight:700}}>{tr.match(/^\d+/)[0]}.</span><span style={{color:'var(--txt2)',fontSize:'.82rem'}} dangerouslySetInnerHTML={{__html:tr.replace(/^\d+\. /,'').replace(/\*\*(.*?)\*\*/g,'<strong style="color:var(--txt)">$1</strong>')}}/></div>);
    }else if(tr==='---'){
      out.push(<hr key={i} style={{border:'none',borderTop:'1px solid var(--border)',margin:'14px 0'}}/>);
    }else if(tr===''){
      out.push(<div key={i} style={{height:5}}/>);
    }else if(tr){
      out.push(
        <div key={i} style={{marginBottom:5}}>
          <p style={{color:'var(--txt2)',fontSize:'.82rem',lineHeight:1.7}} dangerouslySetInnerHTML={{__html:tr.replace(/\*\*(.*?)\*\*/g,'<strong style="color:var(--txt)">$1</strong>').replace(/`(.*?)`/g,'<code style="background:rgba(6,182,212,.1);padding:1px 4px;border-radius:3px;font-family:monospace;font-size:.75em">$1</code>')}}/>
          {isPrompt&&onCopyPrompt&&<CopyBtn text={tr} onCopy={onCopyPrompt}/>}
        </div>
      );
    }
    i++;
  }
  if(inT)flushT();
  return <>{out}</>;
}

/* ── GEMINI IMAGE GENERATOR ── */
async function generateImageFromGemini(apiKey,prompt){
  // Use Imagen via Gemini multimodal
  // Gemini 2.0 Flash image generation endpoint
  const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash-preview-image-generation:generateContent?key=${apiKey}`,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      contents:[{parts:[{text:prompt}]}],
      generationConfig:{responseModalities:["IMAGE","TEXT"],responseMimeType:"text/plain"},
    }),
  });
  if(!res.ok){
    const e=await res.json().catch(()=>({}));
    throw new Error(e?.error?.message||`HTTP ${res.status}`);
  }
  const data=await res.json();
  const parts=data?.candidates?.[0]?.content?.parts||[];
  for(const part of parts){
    if(part.inlineData?.data){
      return `data:${part.inlineData.mimeType||'image/png'};base64,${part.inlineData.data}`;
    }
  }
  throw new Error('Tidak ada gambar dihasilkan. Coba refresh atau ganti prompt.');
}

/* ── IMAGE UPLOADER ── */
function ImgUploader({label,value,onChange}){
  const ref=useRef();
  const handle=(e)=>{
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=ev=>onChange({data:ev.target.result.split(',')[1],mime:f.type,preview:ev.target.result});
    r.readAsDataURL(f);
  };
  return(
    <div>
      <p style={{fontSize:'.72rem',color:'var(--txm)',marginBottom:6}}>{label}</p>
      {value?.preview?(
        <div style={{position:'relative',display:'inline-block'}}>
          <img src={value.preview} style={{width:90,height:90,objectFit:'cover',borderRadius:8,border:'2px solid var(--cyan)'}}/>
          <button onClick={()=>onChange(null)} className="btn btn-r" style={{position:'absolute',top:-6,right:-6,padding:'2px 5px',fontSize:'.65rem'}}>{I.trash}</button>
        </div>
      ):(
        <div className="upbox" onClick={()=>ref.current.click()}>
          <div style={{color:'var(--txm)',fontSize:'.75rem'}}>{I.img}<br/>Klik upload</div>
        </div>
      )}
      <input ref={ref} type="file" accept="image/*" onChange={handle} style={{display:'none'}}/>
    </div>
  );
}

/* ── EXTRACT SCENES ── */
function extractScenes(text){
  if(!text)return[];
  const rows=text.split('\n').filter(l=>l.includes('|'));
  const dataRows=rows.filter(r=>{
    const cols=r.split('|').filter((_,i,a)=>i>0&&i<a.length-1);
    return cols.length>=2&&!/^[-:\s|]+$/.test(r)&&!/Scene.*Durasi|Scene.*Visual|Durasi.*Visual/i.test(r);
  });
  return dataRows.slice(0,5).map((row,idx)=>{
    const cols=row.split('|').filter((_,i,a)=>i>0&&i<a.length-1).map(c=>c.trim());
    return{scene:cols[0]||`Scene ${idx+1}`,visual:cols[1]||"",audio:cols[2]||"",subtitle:cols[3]||"",imagenPrompt:cols[4]||""};
  });
}

              <label style={{fontSize:'.68rem',color:'var(--txm)',marginBottom:3,display:'block'}}>{f.l}</label>
              {f.a
                ?<textarea className="inp" value={form[f.k]||''} onChange={e=>setForm(p=>({...p,[f.k]:e.target.value}))} placeholder={f.ph} style={{minHeight:60,fontSize:'.75rem'}}/>
                :<input className="inp" type={f.t||'text'} value={form[f.k]||''} onChange={e=>setForm(p=>({...p,[f.k]:e.target.value}))} placeholder={f.ph} style={{fontSize:'.75rem'}}/>
              }
            </div>
          ))}
          {[
            {k:'industry',l:'Kategori Industri',opts:INDUSTRIES},
            {k:'angle',l:'Marketing Angle',opts:ANGLES},
            {k:'hook',l:'Viral Hook Style',opts:HOOKS},
          ].map(f=>(
            <div key={f.k}>
              <label style={{fontSize:'.68rem',color:'var(--txm)',marginBottom:3,display:'block'}}>{f.l}</label>
              <select className="inp" value={form[f.k]||f.opts[0]} onChange={e=>setForm(p=>({...p,[f.k]:e.target.value}))} style={{fontSize:'.75rem'}}>
                {f.opts.map(o=><option key={o}>{o}</option>)}
              </select>
            </div>
          ))}
          {/* Sanity Score */}
          <div className="card2" style={{marginTop:4}}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
              <span style={{fontSize:'.68rem',color:'var(--txm)'}}>Sanity Check Finansial</span>
              <span className={`badge ${sanity.cls}`}>{sanity.score}/100</span>
            </div>
            <div className="pbar" style={{marginBottom:5}}><div className="pfill" style={{width:`${sanity.score}%`}}/></div>
            <p style={{fontSize:'.65rem',color:'var(--txm)',lineHeight:1.5}}>{sanity.label}</p>
            <div style={{marginTop:5,fontSize:'.65rem',color:'var(--txm)'}}>
              Qty/bln: <b style={{color:'var(--txt)'}}>{sanity.qty.toLocaleString()}</b> · Traffic: <b style={{color:'var(--txt)'}}>{sanity.traffic.toLocaleString()}</b>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ── MAIN CONTENT ── */
function MainContent({tab,form,apiKey,ugcForm,setUgcForm,imgProduct,setImgProduct,imgModel,setImgModel,aiResult,loading,loadingMsg,scenes,onGenerate,onToast}){
  const tabInfo={
    planner:{title:'Business Architect',desc:'Analisis bisnis + roadmap 12 bulan',icon:'🏗️',color:'var(--cyan)'},
    calendar:{title:'Kalender Konten',desc:'14 konten viral + Five Scene Framework',icon:'📅',color:'var(--purple)'},
    caption:{title:'Viral Caption Lab',desc:'Caption TikTok · Reels · Shorts · Facebook',icon:'✍️',color:'var(--pink)'},
    generator:{title:'UGC Generator',desc:'Skrip video + storyboard + gambar AI',icon:'🎬',color:'var(--green)'},
  };
  const info=tabInfo[tab]||tabInfo.planner;

  const copyAll=()=>{
    if(!aiResult)return;
    navigator.clipboard.writeText(aiResult).then(()=>onToast('Semua output disalin!'));
  };
  const copyPromptCb=(t)=>{
    navigator.clipboard.writeText(t).then(()=>onToast('Prompt disalin!'));
  };

  return(
    <div style={{flex:1,display:'flex',flexDirection:'column',height:'100%',overflow:'hidden'}}>
      {/* Topbar (desktop) */}
      <div style={{padding:'16px 24px 0',flexShrink:0,display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:12,flexWrap:'wrap'}}>
        <div>
          <div className="gsk" style={{fontSize:'1.15rem',fontWeight:800}}>{info.icon} {info.title}</div>
          <div style={{fontSize:'.8rem',color:'var(--txm)',marginTop:2}}>{info.desc}</div>
        </div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
          {aiResult&&<button onClick={copyAll} className="btn btn-g btn-sm">{I.copy} Salin Semua</button>}
          <button onClick={onGenerate} disabled={!apiKey||loading} className="btn btn-c" style={{padding:'10px 20px'}}>
            {loading?<><span className="spin">{I.load}</span>Generating...</>:<>{I.spark} Generate AI</>}
          </button>
        </div>
        {!apiKey&&<div style={{width:'100%',padding:'6px 10px',borderRadius:7,background:'rgba(239,68,68,.08)',border:'1px solid rgba(239,68,68,.2)',fontSize:'.75rem',color:'#f87171',display:'flex',gap:5,alignItems:'center'}}>{I.warn} Isi API Key Gemini di panel kiri terlebih dahulu</div>}
      </div>

      {/* UGC Extra */}
      {tab==='generator'&&(
        <div style={{padding:'12px 24px 0',flexShrink:0}}>
          <div className="card2">
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}>
              <input type="checkbox" id="ugcauto" checked={ugcForm.useAutonomous} onChange={e=>setUgcForm(p=>({...p,useAutonomous:e.target.checked}))} style={{accentColor:'var(--cyan)',width:14,height:14}}/>
              <label htmlFor="ugcauto" style={{fontSize:'.8rem',color:'var(--txt2)',cursor:'pointer'}}>Gunakan Data Produk Khusus UGC</label>
            </div>
            {ugcForm.useAutonomous&&(
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:12}}>
                <div>
                  <label style={{fontSize:'.68rem',color:'var(--txm)',marginBottom:3,display:'block'}}>Nama UGC</label>
                  <input className="inp" value={ugcForm.name} onChange={e=>setUgcForm(p=>({...p,name:e.target.value}))} placeholder="Nama produk UGC..." style={{fontSize:'.78rem'}}/>
                </div>
                <div>
                  <label style={{fontSize:'.68rem',color:'var(--txm)',marginBottom:3,display:'block'}}>Deskripsi UGC</label>
                  <input className="inp" value={ugcForm.desc} onChange={e=>setUgcForm(p=>({...p,desc:e.target.value}))} placeholder="Deskripsi UGC..." style={{fontSize:'.78rem'}}/>
                </div>
              </div>
            )}
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
              <ImgUploader label="📦 Foto Produk" value={imgProduct} onChange={setImgProduct}/>
              <ImgUploader label="👤 Foto Model" value={imgModel} onChange={setImgModel}/>
            </div>
          </div>
        </div>
      )}

      {/* Main output scroll area */}
      <div className="main-body" style={{flex:1,overflow:'auto',padding:'16px 24px'}}>
        {loading?(
          <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',minHeight:'50vh',gap:16}}>
            <div className="spin" style={{color:'var(--cyan)'}}><Ic d={I.load.props.d} s={40}/></div>
            <p className="gsk" style={{color:'var(--cyan)',fontSize:'.95rem',fontWeight:600}}>{loadingMsg}</p>
            <div style={{display:'flex',gap:5}}>{[0,1,2].map(i=><div key={i} className="pulse" style={{width:7,height:7,borderRadius:'50%',background:'var(--purple)',animationDelay:`${i*.3}s`}}/>)}</div>
          </div>
        ):!aiResult?(
          <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',minHeight:'50vh',gap:12,color:'var(--txm)'}}>
            <div style={{fontSize:52}}>🚀</div>
            <p className="gsk" style={{fontSize:'1rem',color:'var(--txt2)'}}>Siap untuk Generate</p>
            <p style={{fontSize:'.8rem',textAlign:'center',maxWidth:380,lineHeight:1.6}}>Isi data produk di sidebar, pastikan API Key Gemini terisi, lalu klik tombol <b style={{color:'var(--cyan)'}}>Generate AI</b>.</p>
          </div>
        ):(
          <div>
            <MdRender text={aiResult} onCopyPrompt={copyPromptCb}/>
            {/* Five Scene Storyboard */}
            {tab==='generator'&&scenes.length>0&&(
              <div style={{marginTop:28}}>
                <div className="gsk" style={{color:'var(--cyan)',fontSize:'.95rem',fontWeight:700,marginBottom:14}}>🎬 Five Scene Storyboard — Generate Image per Scene</div>
                <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))',gap:12}}>
                  {scenes.map((scene,idx)=>(
                    <SceneImageCard key={idx} scene={scene} idx={idx} apiKey={apiKey} productName={form.name||'Product'} onCopyPrompt={copyPromptCb} onToast={onToast}/>
                  ))}
                </div>
                {/* Carousel */}
                <CarouselExporter scenes={scenes} apiKey={apiKey} productName={form.name||'Product'} onToast={onToast}/>
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

/* ── APP ── */
function AppContent(){
  const [theme,setTheme]=useState(()=>safeGet('veo_theme','dark'));
  const [apiKey,setApiKey]=useState(()=>safeGet('veo_studio_apikey',''));
  const [activeTab,setActiveTab]=useState('planner');
  const [sidebarOpen,setSidebarOpen]=useState(false);
  const [toast,setToast]=useState('');
  const [form,setForm]=useState({
    name:"Basreng Kaffir Jeruk Purut",
    desc:"Camilan bakso goreng super renyah beraroma irisan daun jeruk purut segar dengan limpahan cabai asli dan gurih umami tinggi.",
    characteristics:"Renyah empuk tidak keras, potongan presisi, wangi jeruk melimpah, rasa pedas berlevel tahan 6 bulan.",
    price:"20000",capital:"3000000",targetOmzet:"45000000",
    location:"Bandung, Jawa Barat",
    initialMarket:"Pecinta jajanan pedas instan usia remaja hingga dewasa (15-35 tahun) di media sosial Indonesia.",
    industry:"Food (Culinary & Food)",angle:"FOMO",hook:"Pattern Interrupt",
  });
  const [ugcForm,setUgcForm]=useState({useAutonomous:false,name:'',desc:''});
  const [imgProduct,setImgProduct]=useState(null);
  const [imgModel,setImgModel]=useState(null);
  const [aiResult,setAiResult]=useState('');
  const [loading,setLoading]=useState(false);
  const [loadingMsg,setLoadingMsg]=useState('');
  const [scenes,setScenes]=useState([]);
  const msgRef=useRef(null);

  useEffect(()=>{document.documentElement.setAttribute('data-theme',theme);safeSet('veo_theme',theme);},[theme]);
  const toggleTheme=()=>setTheme(t=>t==='dark'?'light':'dark');

  const showToast=(msg)=>{setToast(msg);setTimeout(()=>setToast(''),2500);};

  const buildPrompt=()=>{
    const ctx=ugcForm.useAutonomous&&ugcForm.name
      ?`Nama Produk: ${ugcForm.name}\nDeskripsi: ${ugcForm.desc}`
      :`Nama Produk: ${form.name}\nDeskripsi: ${form.desc}\nKarakteristik: ${form.characteristics}\nHarga Jual: Rp ${parseInt(form.price||0).toLocaleString('id')}\nModal Awal: Rp ${parseInt(form.capital||0).toLocaleString('id')}\nTarget Omzet/Bulan: Rp ${parseInt(form.targetOmzet||0).toLocaleString('id')}\nLokasi: ${form.location}\nTarget Pasar: ${form.initialMarket}\nKategori Industri: ${form.industry}\nMarketing Angle: ${form.angle}\nHook Style: ${form.hook}`;
    return ctx;
  };

  const buildMessages=()=>{
    const parts=[];
    if(activeTab==='generator'){
      if(imgProduct?.data)parts.push({inlineData:{mimeType:imgProduct.mime,data:imgProduct.data}});
      if(imgModel?.data)parts.push({inlineData:{mimeType:imgModel.mime,data:imgModel.data}});
    }
    parts.push({text:buildPrompt()});
    return[{role:'user',parts}];
  };

  const startLoader=(tab)=>{
    const msgs=LOADING_MSGS[tab]||LOADING_MSGS.planner;
    let idx=0;setLoadingMsg(msgs[0]);
    msgRef.current=setInterval(()=>{idx=(idx+1)%msgs.length;setLoadingMsg(msgs[idx]);},2200);
  };

  const generate=async()=>{
    if(!apiKey)return;
    setLoading(true);setAiResult('');setScenes([]);
    startLoader(activeTab);
    try{
      const payload={
        system_instruction:{parts:[{text:SYS[activeTab]||SYS.planner}]},
        contents:buildMessages(),
        generationConfig:{temperature:0.9,maxOutputTokens:8192},
      };
      const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`,{
        method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload),
      });
      if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e?.error?.message||`HTTP ${res.status}`);}
      const data=await res.json();
      const text=data?.candidates?.[0]?.content?.parts?.map(p=>p.text||'').join('')||'';
      if(!text)throw new Error('Respons AI kosong. Coba lagi.');
      setAiResult(text);
      if(activeTab==='generator')setScenes(extractScenes(text));
    }catch(err){
      setAiResult(`## ❌ Error\n\n**${err.message}**\n\n- Pastikan API Key Gemini valid\n- Periksa koneksi internet\n- Model gemini-2.5-flash harus tersedia di akun Anda`);
    }finally{
      clearInterval(msgRef.current);setLoading(false);
    }
  };

  const TABS_NAV=[
    {id:'planner',label:'Bisnis',icon:I.chart},
    {id:'calendar',label:'Kalender',icon:I.cal},
    {id:'caption',label:'Caption',icon:I.pen},
    {id:'generator',label:'UGC',icon:I.vid},
  ];

  return(
    <div className="layout">
      {/* Sidebar overlay (mobile) */}
      <div className={`sidebar-overlay${sidebarOpen?' show':''}`} onClick={()=>setSidebarOpen(false)}/>
      {/* Sidebar */}
      <Sidebar
        form={form} setForm={setForm}
        apiKey={apiKey} setApiKey={setApiKey}
        theme={theme} toggleTheme={toggleTheme}
        activeTab={activeTab} setActiveTab={setActiveTab}
        onClose={()=>setSidebarOpen(false)}
        className={sidebarOpen?'open':''}
      />
      {/* override sidebar class for mobile open */}
      <style>{`.sidebar{${sidebarOpen?'transform:translateX(0)!important;box-shadow:4px 0 30px rgba(0,0,0,.5)':''}}`}</style>

      {/* Main */}
      <div className="main">
        {/* Mobile topbar */}
        <div className="desk-topbar">
          <button onClick={()=>setSidebarOpen(v=>!v)} className="btn btn-g" style={{padding:'7px 9px'}}>{I.menu}</button>
          <div className="gsk grad" style={{fontSize:'.9rem',fontWeight:800,flex:1}}>VEO 3 PRO</div>
          <button onClick={toggleTheme} className="btn btn-g" style={{padding:'7px 9px'}}>{theme==='dark'?I.sun:I.moon}</button>
        </div>

        <MainContent
          tab={activeTab} form={form} apiKey={apiKey}
          ugcForm={ugcForm} setUgcForm={setUgcForm}
          imgProduct={imgProduct} setImgProduct={setImgProduct}
          imgModel={imgModel} setImgModel={setImgModel}
          aiResult={aiResult} loading={loading} loadingMsg={loadingMsg}
          scenes={scenes} onGenerate={generate} onToast={showToast}
        />
      </div>

      {/* Bottom Nav (mobile) */}
      <nav className="bottom-nav">
        {TABS_NAV.map(t=>(
          <button key={t.id} className={`bnav-item${activeTab===t.id?' active':''}`} onClick={()=>setActiveTab(t.id)}>
            {t.icon}<span>{t.label}</span>
          </button>
        ))}
        <button className="bnav-item" onClick={()=>setSidebarOpen(v=>!v)}>
          {I.menu}<span>Menu</span>
        </button>
      </nav>

      {/* Toast */}
      {toast&&<div className="toast">{I.chk} {toast}</div>}
    </div>
  );
}

class ErrorBoundary extends React.Component{
  constructor(p){super(p);this.state={err:null}}
  static getDerivedStateFromError(e){return{err:e}}
  handleReset(){try{localStorage.clear();}catch{}window.location.reload();}
  render(){
    if(!this.state.err)return this.props.children;
    return(
      <div style={{minHeight:'100vh',background:'#030712',display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
        <div style={{maxWidth:500,background:'rgba(239,68,68,.08)',border:'1px solid rgba(239,68,68,.25)',borderRadius:16,padding:28,textAlign:'center'}}>
          <div style={{fontSize:44,marginBottom:12}}>⚠️</div>
          <h2 style={{color:'#f87171',fontSize:'1.2rem',marginBottom:10,fontFamily:"'Space Grotesk',sans-serif"}}>Error Aplikasi</h2>
          <p style={{color:'#94a3b8',fontSize:'.78rem',marginBottom:18,fontFamily:'monospace',background:'rgba(0,0,0,.3)',padding:10,borderRadius:7,textAlign:'left',whiteSpace:'pre-wrap'}}>{this.state.err?.toString()}</p>
          <button onClick={()=>this.handleReset()} style={{background:'linear-gradient(135deg,#0891b2,#6d28d9)',color:'#fff',border:'none',padding:'10px 22px',borderRadius:9,cursor:'pointer',fontWeight:600}}>🔄 Reset & Muat Ulang</button>
        </div>
      </div>
    );
  }
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <ErrorBoundary><AppContent/></ErrorBoundary>
);
</script>
</body>
</html>
