<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Veo 3 Pro Studio</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#030712;--bg2:#0d1117;--card:#111827;--card2:#161f2e;
  --border:#1f2937;--cyan:#06b6d4;--purple:#a855f7;--pink:#ec4899;
  --green:#10b981;--yellow:#f59e0b;--red:#ef4444;
  --txt:#f1f5f9;--txt2:#94a3b8;--txm:#475569;
  --sw:300px;--bnav:60px;
}
[data-theme="light"]{
  --bg:#f0f4f8;--bg2:#e2e8f0;--card:#fff;--card2:#f8fafc;
  --border:#cbd5e1;--txt:#0f172a;--txt2:#334155;--txm:#64748b;
}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:'Inter',sans-serif;overflow:hidden;-webkit-tap-highlight-color:transparent}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:#334155;border-radius:2px}
.mono{font-family:'JetBrains Mono',monospace}
.gsk{font-family:'Space Grotesk',sans-serif}
.grad{background:linear-gradient(135deg,var(--cyan),var(--purple),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.glass{background:rgba(17,24,39,.75);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.06)}
[data-theme="light"] .glass{background:rgba(255,255,255,.85);border-color:rgba(0,0,0,.08)}

/* ── LAYOUT ── */
.layout{display:flex;height:100vh;overflow:hidden;position:relative}
.sidebar{
  width:var(--sw);flex-shrink:0;background:var(--bg2);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  height:100vh;overflow-y:auto;
  z-index:300;
  transition:transform .28s cubic-bezier(.4,0,.2,1);
}
.main{flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden;min-width:0}
.main-body{flex:1;overflow-y:auto;padding:16px 20px}

/* ── MOBILE ── */
@media(max-width:768px){
  .sidebar{
    position:fixed;top:0;left:0;height:100vh;
    transform:translateX(-100%);
    box-shadow:none;
  }
  .sidebar.open{
    transform:translateX(0);
    box-shadow:6px 0 40px rgba(0,0,0,.6);
  }
  .sidebar-overlay{
    display:none;position:fixed;inset:0;
    background:rgba(0,0,0,.55);z-index:299;
    backdrop-filter:blur(2px);
  }
  .sidebar-overlay.show{display:block}
  .main{padding-bottom:var(--bnav)}
  .main-body{padding:12px 12px calc(var(--bnav) + 12px)}
  .bottom-nav{display:flex !important}
  .mobile-topbar{display:flex !important}
  .desktop-header{display:none}
}
@media(min-width:769px){
  .bottom-nav{display:none !important}
  .mobile-topbar{display:none !important}
  .hamburger-btn{display:none !important}
}

/* ── BOTTOM NAV ── */
.bottom-nav{
  display:none;
  position:fixed;bottom:0;left:0;right:0;
  height:var(--bnav);
  background:var(--card);
  border-top:1px solid var(--border);
  z-index:200;
  safe-area-inset-bottom: env(safe-area-inset-bottom);
  padding-bottom:env(safe-area-inset-bottom,0px);
}
.bnav-item{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:2px;cursor:pointer;
  color:var(--txm);font-size:.58rem;font-weight:600;
  transition:.15s;padding:4px 2px;
  border:none;background:transparent;
  -webkit-tap-highlight-color:transparent;
  min-height:44px;
}
.bnav-item.active{color:var(--cyan)}
.bnav-item.active svg{filter:drop-shadow(0 0 6px rgba(6,182,212,.5))}
.bnav-item svg{width:21px;height:21px;transition:.15s}

/* ── MOBILE TOPBAR ── */
.mobile-topbar{
  display:none;
  align-items:center;
  padding:10px 12px;
  background:var(--bg2);
  border-bottom:1px solid var(--border);
  gap:10px;
  flex-shrink:0;
  min-height:50px;
}

/* ── SIDEBAR ITEMS ── */
.slink{
  display:flex;align-items:center;gap:10px;
  padding:10px 13px;border-radius:10px;cursor:pointer;
  transition:.18s;color:var(--txt2);font-size:.83rem;font-weight:500;
  border:1px solid transparent;
  min-height:44px;
}
.slink:hover{background:rgba(6,182,212,.08);color:var(--cyan);border-color:rgba(6,182,212,.15)}
.slink.active{background:linear-gradient(135deg,rgba(6,182,212,.15),rgba(168,85,247,.1));color:var(--cyan);border-color:rgba(6,182,212,.25)}

/* ── INPUTS ── */
.inp{
  width:100%;padding:9px 12px;border-radius:8px;
  border:1px solid var(--border);background:var(--bg2);
  color:var(--txt);font-size:.82rem;outline:none;
  transition:.2s;font-family:'Inter',sans-serif;
  -webkit-appearance:none;
}
.inp:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(6,182,212,.1)}
.inp::placeholder{color:var(--txm)}
textarea.inp{resize:vertical;min-height:68px}
select.inp option{background:var(--card)}

/* ── BUTTONS ── */
.btn{
  padding:9px 16px;border-radius:9px;font-size:.8rem;
  font-weight:600;cursor:pointer;transition:.18s;border:none;
  display:inline-flex;align-items:center;gap:6px;
  -webkit-tap-highlight-color:transparent;
  min-height:40px;
}
.btn-c{background:linear-gradient(135deg,#0891b2,#6d28d9);color:#fff}
.btn-c:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 6px 20px rgba(6,182,212,.3)}
.btn-c:active:not(:disabled){transform:translateY(0)}
.btn-c:disabled{opacity:.4;cursor:not-allowed}
.btn-g{background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--txt2)}
.btn-g:hover{border-color:var(--cyan);color:var(--cyan)}
.btn-r{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.25);color:#f87171}
.btn-r:hover{background:rgba(239,68,68,.2)}
.btn-sm{padding:5px 11px;font-size:.72rem;min-height:32px}

/* ── CARDS ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:16px}
.card2{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:12px}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 9px;border-radius:999px;font-size:.68rem;font-weight:600}
.b-g{background:rgba(16,185,129,.12);color:#34d399;border:1px solid rgba(16,185,129,.2)}
.b-y{background:rgba(245,158,11,.12);color:#fbbf24;border:1px solid rgba(245,158,11,.2)}
.b-r{background:rgba(239,68,68,.12);color:#f87171;border:1px solid rgba(239,68,68,.2)}
.b-c{background:rgba(6,182,212,.12);color:var(--cyan);border:1px solid rgba(6,182,212,.2)}
.b-p{background:rgba(168,85,247,.12);color:#c084fc;border:1px solid rgba(168,85,247,.2)}

/* ── PROGRESS ── */
.pbar{height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.pfill{height:100%;background:linear-gradient(90deg,var(--cyan),var(--purple));border-radius:3px;transition:width .4s}

/* ── ANIMATIONS ── */
.spin{animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.pulse{animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.fadein{animation:fadein .35s ease}
@keyframes fadein{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ── UPLOAD ── */
.upbox{
  border:2px dashed var(--border);border-radius:10px;
  padding:20px 12px;text-align:center;cursor:pointer;transition:.2s;
}
.upbox:hover{border-color:var(--cyan);background:rgba(6,182,212,.04)}

/* ── SCENE CARDS ── */
.scard{
  background:linear-gradient(135deg,var(--card),var(--card2));
  border:1px solid var(--border);border-radius:14px;
  overflow:hidden;transition:.22s;
}
.scard:hover{border-color:var(--cyan);box-shadow:0 8px 28px rgba(6,182,212,.1)}

/* ── AI IMAGE ── */
.ai-img{
  width:100%;border-radius:10px;display:block;
  border:1px solid var(--border);
  aspect-ratio:1;object-fit:cover;
}
.img-skeleton{
  width:100%;aspect-ratio:1;border-radius:10px;
  background:linear-gradient(135deg,var(--card2),var(--card));
  border:1px solid var(--border);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:10px;color:var(--txm);font-size:.75rem;
  text-align:center;padding:16px;position:relative;overflow:hidden;
}
.img-skeleton::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.04),transparent);
  animation:shimmer 1.5s infinite;
}
@keyframes shimmer{from{transform:translateX(-100%)}to{transform:translateX(100%)}}

/* ── MARKDOWN TABLES ── */
.mdwrap{overflow-x:auto;margin-bottom:14px;border-radius:10px}
.mdt{width:100%;border-collapse:collapse;font-size:.78rem}
.mdt th{background:linear-gradient(135deg,rgba(6,182,212,.14),rgba(168,85,247,.08));color:var(--cyan);padding:9px 11px;text-align:left;border:1px solid rgba(6,182,212,.18);font-weight:600;white-space:nowrap}
.mdt td{padding:7px 11px;border:1px solid var(--border);color:var(--txt2);vertical-align:top;min-width:80px}
.mdt tr:nth-child(even) td{background:rgba(255,255,255,.018)}
.mdt tr:hover td{background:rgba(6,182,212,.03)}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:calc(var(--bnav) + 12px);right:16px;
  background:linear-gradient(135deg,#059669,#0d9488);
  color:#fff;padding:9px 18px;
  border-radius:10px;font-size:.8rem;font-weight:600;
  z-index:9999;animation:fadein .3s ease;
  display:flex;align-items:center;gap:7px;
  box-shadow:0 4px 16px rgba(16,185,129,.3);
}
@media(min-width:769px){.toast{bottom:20px;right:20px}}

/* ── PROMPT BOX ── */
.prompt-box{
  background:rgba(6,182,212,.05);
  border:1px solid rgba(6,182,212,.2);
  border-radius:9px;padding:10px 12px;margin-top:8px;
}
.prompt-text{
  font-family:'JetBrains Mono',monospace;
  font-size:.72rem;color:var(--txt2);line-height:1.65;
  word-break:break-word;
}

/* ── IMAGE GEN STATUS ── */
.img-gen-bar{
  display:flex;align-items:center;gap:8px;
  padding:8px 12px;border-radius:8px;
  background:rgba(6,182,212,.08);
  border:1px solid rgba(6,182,212,.15);
  font-size:.72rem;color:var(--cyan);margin-bottom:10px;
}
</style>
</head>

/* ── UTILS ── */
function safeGet(k,d=""){try{return localStorage.getItem(k)??d}catch{return d}}

function calcSanity(cap,price,tgt){
  const c=parseFloat(cap)||0,p=parseFloat(price)||1,t=parseFloat(tgt)||1;
  const ratio=c/t,qty=t/p,traffic=qty/0.025;
  let score,label,cls;
  if(ratio<0.05){score=40;label="Risiko Tinggi — Modal Minim";cls="b-r"}

  else{score=95;label="Sehat — Modal Cukup";cls="b-g"}
  return{score,label,cls,qty:Math.ceil(qty),traffic:Math.ceil(traffic),ratio:(ratio*100).toFixed(1)};
}

/* ── GENERATE IMAGE VIA GEMINI ── */
async function generateImage(apiKey, prompt) {
  const enhancedPrompt = `${prompt}, cinematic commercial photography, professional studio lighting, ultra-detailed, 4K quality, photorealistic, sharp focus`;
  const res = await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash-preview-image-generation:generateContent?key=${apiKey}`,
    {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        contents: [{parts: [{text: enhancedPrompt}]}],
        generationConfig: {
          responseModalities: ["IMAGE","TEXT"],
          responseMimeType: "text/plain",
        },
      }),
    }
  );
  if (!res.ok) {
    const e = await res.json().catch(()=>({}));
    throw new Error(e?.error?.message || `HTTP ${res.status}`);
  }
  const data = await res.json();
  const parts = data?.candidates?.[0]?.content?.parts || [];
  for (const part of parts) {
    if (part.inlineData?.data) {
      return `data:${part.inlineData.mimeType||'image/png'};base64,${part.inlineData.data}`;
    }
  }
  throw new Error('Tidak ada gambar dihasilkan. Prompt mungkin terlalu terbatas.');
}

function MdRender({text, onCopyPrompt}) {
  if (!text) return null;
  const lines = text.split('\n');
  const out = [];
  let trows = [], inT = false, i = 0;

  function flushT() {
    if (!trows.length) return;
    const hds = trows[0], body = trows.slice(1);
    out.push(
      <div key={`tw${i}`} className="mdwrap">
        <table className="mdt">
          <thead><tr>{hds.map((h,hi)=><th key={hi}>{h.trim()}</th>)}</tr></thead>
          <tbody>{body.map((row,ri)=>(
            <tr key={ri}>{row.map((cell,ci)=>{
              const html = cell.trim()
                .replace(/\*\*(.*?)\*\*/g,'<strong style="color:var(--cyan)">$1</strong>')
                .replace(/`(.*?)`/g,'<code style="background:rgba(6,182,212,.1);padding:1px 4px;border-radius:3px;font-family:monospace;font-size:.75em">$1</code>');
              return <td key={ci}><span dangerouslySetInnerHTML={{__html:html}}/></td>;
            })}</tr>
          ))}</tbody>
        </table>
      </div>
    );
    trows = [];
  }

  while (i < lines.length) {
    const line = lines[i], tr = line.trim();

    if (tr.startsWith('|')) {
      const cols = tr.split('|').filter((_,idx,a)=>idx>0&&idx<a.length-1);
      if (cols.every(c=>/^[-:\s]+$/.test(c))) { i++; continue; }
      if (!inT) inT = true;
      trows.push(cols); i++; continue;
    } else if (inT) { inT = false; flushT(); }

    // detect prompt-like text blocks
    const isPromptLine = (
      tr.length > 30 &&
      !tr.startsWith('#') &&
      !tr.startsWith('|') &&
      (
        /prompt/i.test(tr) ||
        /(cinematic|photography|studio lighting|photorealistic|4K|shot|camera|lens|bokeh|depth of field)/i.test(tr)
      )
    );

    if (/^### /.test(tr)) {
      out.push(<h3 key={i} className="gsk grad" style={{fontSize:'.95rem',fontWeight:700,marginTop:18,marginBottom:7}}>{tr.slice(4)}</h3>);
    } else if (/^## /.test(tr)) {
      out.push(<h2 key={i} className="gsk" style={{fontSize:'1.08rem',fontWeight:700,marginTop:22,marginBottom:9,color:'var(--cyan)',borderBottom:'1px solid rgba(6,182,212,.2)',paddingBottom:5}}>{tr.slice(3)}</h2>);
    } else if (/^# /.test(tr)) {
      out.push(<h1 key={i} className="gsk grad" style={{fontSize:'1.3rem',fontWeight:800,marginTop:24,marginBottom:10}}>{tr.slice(2)}</h1>);
    } else if (/^[-*] /.test(tr)) {
      const content = tr.slice(2);
      const isPromptBullet = content.length > 40 && /(prompt|cinematic|photography|studio|photorealistic)/i.test(content);
      out.push(
        <div key={i} style={{display:'flex',gap:8,marginBottom:4,paddingLeft:6}}>
          <span style={{color:'var(--cyan)',marginTop:3,flexShrink:0,fontSize:'.75rem'}}>▸</span>
          <div style={{flex:1}}>
            <span style={{color:'var(--txt2)',fontSize:'.82rem'}} dangerouslySetInnerHTML={{__html:content.replace(/\*\*(.*?)\*\*/g,'<strong style="color:var(--txt)">$1</strong>')}}/>
            {isPromptBullet && onCopyPrompt && (
              <div style={{marginTop:4}}>
                <button onClick={()=>onCopyPrompt(content)} className="btn btn-g btn-sm">
                  {I.copy}<span>Copy Prompt</span>
                </button>
              </div>
            )}
          </div>
        </div>
      );
    } else if (/^\d+\. /.test(tr)) {
      out.push(<div key={i} style={{display:'flex',gap:8,marginBottom:4,paddingLeft:6}}><span style={{color:'var(--purple)',minWidth:18,fontSize:'.78rem',fontWeight:700}}>{tr.match(/^\d+/)[0]}.</span><span style={{color:'var(--txt2)',fontSize:'.82rem'}} dangerouslySetInnerHTML={{__html:tr.replace(/^\d+\. /,'').replace(/\*\*(.*?)\*\*/g,'<strong style="color:var(--txt)">$1</strong>')}}/></div>);
    } else if (tr === '---') {
      out.push(<hr key={i} style={{border:'none',borderTop:'1px solid var(--border)',margin:'14px 0'}}/>);
    } else if (tr === '') {
      out.push(<div key={i} style={{height:5}}/>);
    } else if (tr) {
      out.push(
        <div key={i} style={{marginBottom:5}}>
          <p style={{color:'var(--txt2)',fontSize:'.82rem',lineHeight:1.7}} dangerouslySetInnerHTML={{__html:tr.replace(/\*\*(.*?)\*\*/g,'<strong style="color:var(--txt)">$1</strong>').replace(/`(.*?)`/g,'<code style="background:rgba(6,182,212,.1);padding:1px 4px;border-radius:3px;font-family:monospace;font-size:.75em">$1</code>')}}/>
          {isPromptLine && onCopyPrompt && (
            <div style={{marginTop:4}}>
              <button onClick={()=>onCopyPrompt(tr)} className="btn btn-g btn-sm">
                {I.copy}<span>Copy Prompt</span>
              </button>
            </div>
          )}
        </div>
      );
    }
    i++;
  }
  if (inT) flushT();
  return <>{out}</>;
}

function SceneImageCard({scene, idx, apiKey, productName, onToast, autoGenerate}) {
  const meta = SCENE_META[idx] || SCENE_META[0];
  const [imgSrc, setImgSrc] = useState(null);
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState('');
  const [progress, setProgress] = useState('');
  const hasAutoGeneratedRef = useRef(false);

  const buildPrompt = () => {
    const base = scene.imagenPrompt || scene.visual || `${meta.label} scene for ${productName} product commercial video`;
    return base;
  };

  const gen = useCallback(async () => {
    if (!apiKey || loading) return;
    setLoading(true); setErr(''); setProgress('Memproses prompt...');
    try {
      setProgress('Menghubungi Gemini...');
      const src = await generateImage(apiKey, buildPrompt());
      setImgSrc(src);
      setProgress('');
    } catch(e) {
      setErr(e.message);
      setProgress('');
    } finally {
      setLoading(false);
    }
  }, [apiKey, scene, loading]);

  // Auto-generate when component mounts if autoGenerate flag is set
  useEffect(() => {
    if (autoGenerate && apiKey && !hasAutoGeneratedRef.current && !imgSrc && !loading) {
      hasAutoGeneratedRef.current = true;
      // Stagger: scene index * 1.5s delay so we don't hammer the API
      const timer = setTimeout(() => gen(), idx * 1600);
      return () => clearTimeout(timer);
    }
  }, [autoGenerate]);

  const download = () => {
    if (!imgSrc) return;
    const a = document.createElement('a');
    a.href = imgSrc; a.download = `scene_${idx+1}_${meta.label.toLowerCase()}.png`; a.click();
  };

  const copyPrompt = () => {
    const p = buildPrompt();

  return (
    <div className="scard fadein">
      {/* Header */}
      <div style={{padding:'11px 14px',borderBottom:'1px solid rgba(255,255,255,.06)',background:meta.grad}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>

            <div>

              <div style={{fontSize:'.6rem',color:'rgba(255,255,255,.45)',fontFamily:'JetBrains Mono,monospace'}}>{meta.cam}</div>
            </div>
          </div>
          <span style={{fontSize:'.6rem',color:meta.color,background:`${meta.color}22`,padding:'2px 8px',borderRadius:999,border:`1px solid ${meta.color}44`}}>
            {scene.scene || `Scene ${idx+1}`}
          </span>
        </div>
      </div>

      <div style={{padding:12}}>
        {/* ── IMAGE AREA ── */}
        {loading ? (
          <div className="img-skeleton">
            <div className="spin" style={{color:meta.color}}><Ic d={I.load.props.d} s={28}/></div>
            <div style={{color:meta.color,fontSize:'.75rem',fontWeight:600}}>{progress || 'Generating image...'}</div>
            <div style={{fontSize:'.65rem',color:'var(--txm)'}}>Mohon tunggu 10–20 detik</div>
          </div>
        ) : imgSrc ? (
          <div style={{position:'relative'}}>
            <img src={imgSrc} alt={`scene ${idx+1}`} className="ai-img fadein"/>
            <div style={{position:'absolute',top:6,left:6,display:'flex',gap:5}}>
              <span style={{background:'rgba(0,0,0,.7)',borderRadius:6,padding:'2px 7px',fontSize:'.62rem',fontWeight:700,color:meta.color,fontFamily:'JetBrains Mono,monospace'}}>S{idx+1}</span>
            </div>
          </div>
        ) : (
          <div className="img-skeleton">
            <div style={{fontSize:32}}>{meta.icon}</div>
            <div style={{color:'var(--txt2)',fontSize:'.75rem'}}>Image akan di-generate otomatis</div>
            {err && <div style={{color:'var(--red)',fontSize:'.68rem',textAlign:'center',marginTop:4,lineHeight:1.5}}>{err}</div>}
          </div>
        )}

        {/* ── BUTTONS ROW ── */}
        <div style={{display:'flex',gap:6,marginTop:9,marginBottom:11,flexWrap:'wrap'}}>
          <button onClick={gen} disabled={loading || !apiKey} className="btn btn-c btn-sm" style={{flex:1}}>
            {loading ? <span className="spin">{I.load}</span> : I.refresh}
            {loading ? 'Generating...' : imgSrc ? 'Re-generate' : 'Generate Image'}
          </button>
          {imgSrc && (
            <button onClick={download} className="btn btn-g btn-sm" title="Download">{I.dl}</button>
          )}
        </div>

        {/* ── SCENE DETAILS ── */}
        {[
          {label:'📷 Visual', content: scene.visual},
          {label:'🎙 Audio / VO', content: scene.audio},
          {label:'📝 On-Screen Text', content: scene.subtitle},
        ].map(s => s.content && (
          <div key={s.label} style={{marginBottom:8}}>
            <div style={{fontSize:'.63rem',color:'var(--txm)',marginBottom:3,fontWeight:600}}>{s.label}</div>
            <div style={{fontSize:'.78rem',color:'var(--txt2)',background:'rgba(0,0,0,.2)',padding:'7px 9px',borderRadius:7,lineHeight:1.55}}>{s.content}</div>
          </div>
        ))}

        {/* ── IMAGEN PROMPT + COPY ── */}
        {scene.imagenPrompt && (
          <div className="prompt-box">
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:6}}>
              <span style={{fontSize:'.63rem',color:'var(--cyan)',fontWeight:700}}>🖼 Imagen Prompt</span>

            </div>

        )}
      </div>
    </div>
  );
}

/* ── IMAGE UPLOADER ── */
function ImgUploader({label, value, onChange}) {
  const ref = useRef();
  const handle = (e) => {
    const f = e.target.files[0]; if (!f) return;
    const r = new FileReader();
    r.onload = ev => onChange({data: ev.target.result.split(',')[1], mime: f.type, preview: ev.target.result});
    r.readAsDataURL(f);
  };
  return (
    <div>
      <p style={{fontSize:'.72rem',color:'var(--txm)',marginBottom:6}}>{label}</p>
      {value?.preview ? (
        <div style={{position:'relative',display:'inline-block'}}>
          <img src={value.preview} style={{width:88,height:88,objectFit:'cover',borderRadius:9,border:'2px solid var(--cyan)'}}/>
          <button onClick={()=>onChange(null)} className="btn btn-r" style={{position:'absolute',top:-7,right:-7,padding:'3px 6px',fontSize:'.65rem',minHeight:'auto'}}>{I.trash}</button>
        </div>
      ) : (
        <div className="upbox" onClick={()=>ref.current.click()}>
          <div style={{color:'var(--txm)',fontSize:'.72rem'}}>{I.img}<br/>Tap upload</div>
        </div>
      )}
      <input ref={ref} type="file" accept="image/*" onChange={handle} style={{display:'none'}}/>
    </div>
  );
}

/* ── EXTRACT SCENES ── */
function extractScenes(text) {
  if (!text) return [];
  const rows = text.split('\n').filter(l => l.includes('|'));
  const dataRows = rows.filter(r => {
    const cols = r.split('|').filter((_,i,a) => i>0 && i<a.length-1);
    return (
      cols.length >= 2 &&
      !/^[-:\s|]+$/.test(r) &&
      !/Scene.*Durasi|Scene.*Visual|Durasi.*Visual|Scene.*Camera|Hook.*Build/i.test(r) &&
      !/^[\s|:-]+$/.test(r)
    );
  });
  // Dedupe: take first 5 that look like actual scene rows
  return dataRows.slice(0, 5).map((row, idx) => {
    const cols = row.split('|').filter((_,i,a) => i>0 && i<a.length-1).map(c => c.trim());
    return {
      scene: cols[0] || `Scene ${idx+1}`,
      visual: cols[1] || '',
      audio: cols[2] || '',
      subtitle: cols[3] || '',
      imagenPrompt: cols[4] || '',
    };
  });
}

            {t.icon}<span>{t.label}</span>
          </div>
        ))}
      </div>

      {/* Form */}
      <div style={{padding:'10px 14px',flex:1,overflow:'auto'}}>
        <p style={{fontSize:'.6rem',color:'var(--txm)',marginBottom:8,textTransform:'uppercase',letterSpacing:.8,fontWeight:600}}>DATA PRODUK GLOBAL</p>
        <div style={{display:'flex',flexDirection:'column',gap:8}}>
          {fields.map(f => (
            <div key={f.k}>
              <label style={{fontSize:'.67rem',color:'var(--txm)',marginBottom:3,display:'block',fontWeight:500}}>{f.l}</label>
              {f.a
                ? <textarea className="inp" value={form[f.k]||''} onChange={e=>setForm(p=>({...p,[f.k]:e.target.value}))} placeholder={f.ph} style={{minHeight:60,fontSize:'.78rem'}}/>
                : <input className="inp" type={f.t||'text'} value={form[f.k]||''} onChange={e=>setForm(p=>({...p,[f.k]:e.target.value}))} placeholder={f.ph} style={{fontSize:'.78rem'}}/>
              }
            </div>
          ))}

          {[
            {k:'industry',l:'Kategori Industri',opts:INDUSTRIES},
            {k:'angle',l:'Marketing Angle',opts:ANGLES},
            {k:'hook',l:'Viral Hook Style',opts:HOOKS},
          ].map(f => (
            <div key={f.k}>
              <label style={{fontSize:'.67rem',color:'var(--txm)',marginBottom:3,display:'block',fontWeight:500}}>{f.l}</label>
              <select className="inp" value={form[f.k]||f.opts[0]} onChange={e=>setForm(p=>({...p,[f.k]:e.target.value}))} style={{fontSize:'.78rem'}}>
                {f.opts.map(o=><option key={o}>{o}</option>)}
              </select>
            </div>
          ))}

          {/* Sanity Score */}
          <div className="card2" style={{marginTop:4}}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
              <span style={{fontSize:'.67rem',color:'var(--txm)',fontWeight:500}}>Sanity Check Finansial</span>
              <span className={`badge ${sanity.cls}`}>{sanity.score}/100</span>
            </div>
            <div className="pbar" style={{marginBottom:6}}><div className="pfill" style={{width:`${sanity.score}%`}}/></div>
            <p style={{fontSize:'.65rem',color:'var(--txm)',lineHeight:1.5}}>{sanity.label}</p>
            <div style={{marginTop:5,fontSize:'.65rem',color:'var(--txm)'}}>
              Qty/bln: <b style={{color:'var(--txt)'}}>{sanity.qty.toLocaleString()}</b> · Traffic: <b style={{color:'var(--txt)'}}>{sanity.traffic.toLocaleString()}</b>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ── MAIN CONTENT ── */
function MainContent({tab, form, apiKey, ugcForm, setUgcForm, imgProduct, setImgProduct, imgModel, setImgModel, aiResult, loading, loadingMsg, loadingPct, scenes, autoGenImages, onGenerate, onToast}) {
  const tabInfo = {
    planner:{title:'Business Architect',desc:'Analisis bisnis komprehensif + roadmap 12 bulan',icon:'🏗️'},
    calendar:{title:'Kalender Konten Viral',desc:'14 konten siap pakai + Five Scene Framework',icon:'📅'},
    caption:{title:'Viral Caption Lab',desc:'Caption TikTok · Reels · Shorts · Facebook',icon:'✍️'},
    generator:{title:'UGC Video Generator',desc:'Skrip lengkap + storyboard + gambar AI per scene',icon:'🎬'},
  };
  const info = tabInfo[tab] || tabInfo.planner;

  const copyAll = () => {
    if (!aiResult) return;
    navigator.clipboard.writeText(aiResult).then(()=>onToast('Semua output disalin!'));
  };
  const copyPromptCb = (t) => {
    navigator.clipboard.writeText(t).then(()=>onToast('Prompt disalin!'));
  };

  return (
    <div style={{flex:1,display:'flex',flexDirection:'column',height:'100%',overflow:'hidden'}}>

      {/* Desktop header */}
      <div className="desktop-header" style={{padding:'16px 22px 0',flexShrink:0}}>
        <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:12,flexWrap:'wrap'}}>
          <div>
            <div className="gsk" style={{fontSize:'1.15rem',fontWeight:800}}>{info.icon} {info.title}</div>
            <div style={{fontSize:'.78rem',color:'var(--txm)',marginTop:2}}>{info.desc}</div>
          </div>
          <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
            {aiResult && <button onClick={copyAll} className="btn btn-g btn-sm">{I.copy} Salin Semua</button>}
            <button onClick={onGenerate} disabled={!apiKey||loading} className="btn btn-c" style={{padding:'10px 22px'}}>
              {loading ? <><span className="spin">{I.load}</span>Generating...</> : <>{I.spark} Generate AI</>}
            </button>
          </div>
        </div>
        {!apiKey && (
          <div style={{marginTop:10,padding:'7px 11px',borderRadius:8,background:'rgba(239,68,68,.08)',border:'1px solid rgba(239,68,68,.2)',fontSize:'.75rem',color:'#f87171',display:'flex',gap:5,alignItems:'center'}}>
            {I.warn} Isi API Key Gemini di panel kiri terlebih dahulu
          </div>
        )}
      </div>

      {/* UGC Extra form */}
      {tab === 'generator' && (
        <div style={{padding:'10px 22px 0',flexShrink:0}}>
          <div className="card2">
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}>
              <input type="checkbox" id="ugcauto" checked={ugcForm.useAutonomous} onChange={e=>setUgcForm(p=>({...p,useAutonomous:e.target.checked}))} style={{accentColor:'var(--cyan)',width:15,height:15}}/>
              <label htmlFor="ugcauto" style={{fontSize:'.8rem',color:'var(--txt2)',cursor:'pointer'}}>Gunakan Data Produk Khusus UGC</label>
            </div>
            {ugcForm.useAutonomous && (
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:12}}>
                <div>
                  <label style={{fontSize:'.67rem',color:'var(--txm)',marginBottom:3,display:'block'}}>Nama UGC</label>
                  <input className="inp" value={ugcForm.name} onChange={e=>setUgcForm(p=>({...p,name:e.target.value}))} placeholder="Nama produk..." style={{fontSize:'.78rem'}}/>
                </div>
                <div>
                  <label style={{fontSize:'.67rem',color:'var(--txm)',marginBottom:3,display:'block'}}>Deskripsi UGC</label>
                  <input className="inp" value={ugcForm.desc} onChange={e=>setUgcForm(p=>({...p,desc:e.target.value}))} placeholder="Deskripsi..." style={{fontSize:'.78rem'}}/>
                </div>
              </div>
            )}
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
              <ImgUploader label="📦 Foto Produk" value={imgProduct} onChange={setImgProduct}/>
              <ImgUploader label="👤 Foto Model" value={imgModel} onChange={setImgModel}/>
            </div>
          </div>
        </div>
      )}

      {/* Mobile generate bar */}
      <div style={{display:'flex',gap:8,padding:'10px 12px 0',flexShrink:0}} className="mobile-topbar" style2="display:none">
        {aiResult && <button onClick={copyAll} className="btn btn-g btn-sm">{I.copy}</button>}
        <button onClick={onGenerate} disabled={!apiKey||loading} className="btn btn-c" style={{flex:1,justifyContent:'center'}}>
          {loading ? <><span className="spin">{I.load}</span>Generating...</> : <>{I.spark} Generate AI</>}
        </button>
      </div>

      {/* ── SCROLL CONTENT ── */}
      <div className="main-body">
        {loading ? (
          <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',minHeight:'55vh',gap:16}}>
            <div className="spin" style={{color:'var(--cyan)'}}><Ic d={I.load.props.d} s={44}/></div>
            <p className="gsk" style={{color:'var(--cyan)',fontSize:'.95rem',fontWeight:600,textAlign:'center',maxWidth:280}}>{loadingMsg}</p>
            {/* progress bar */}
            <div style={{width:220,height:4,background:'var(--border)',borderRadius:3,overflow:'hidden'}}>
              <div className="pfill" style={{width:`${loadingPct}%`,transition:'width .6s'}}/>
            </div>
            <div style={{display:'flex',gap:6}}>
              {[0,1,2].map(i=>(
                <div key={i} className="pulse" style={{width:7,height:7,borderRadius:'50%',background:'var(--purple)',animationDelay:`${i*.3}s`}}/>
              ))}
            </div>
            <p style={{fontSize:'.72rem',color:'var(--txm)',textAlign:'center',maxWidth:240,lineHeight:1.5}}>
              Output bisa berukuran besar — mohon tunggu hingga selesai
            </p>
          </div>
        ) : !aiResult ? (
          <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',minHeight:'55vh',gap:12,color:'var(--txm)'}}>
            <div style={{fontSize:54}}>🚀</div>
            <p className="gsk" style={{fontSize:'1rem',color:'var(--txt2)',fontWeight:600}}>Siap Generate</p>
            <p style={{fontSize:'.8rem',textAlign:'center',maxWidth:360,lineHeight:1.65,color:'var(--txm)'}}>
              Isi data produk di sidebar, pastikan API Key Gemini terisi, lalu tekan tombol <b style={{color:'var(--cyan)'}}>Generate AI</b>.
            </p>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginTop:8,maxWidth:320}}>
              {[
                {icon:'🏗️',label:'Business Architect',desc:'Analisis SWOT + roadmap'},
                {icon:'📅',label:'Kalender Konten',desc:'14 konten siap posting'},
                {icon:'✍️',label:'Caption Lab',desc:'Copywriting per platform'},
                {icon:'🎬',label:'UGC Generator',desc:'Script + gambar AI'},
              ].map(f=>(
                <div key={f.label} className="card2" style={{padding:10}}>
                  <div style={{fontSize:20,marginBottom:4}}>{f.icon}</div>
                  <div style={{fontSize:'.72rem',color:'var(--txt2)',fontWeight:600}}>{f.label}</div>
                  <div style={{fontSize:'.65rem',color:'var(--txm)',marginTop:2}}>{f.desc}</div>
                </div>
              ))}
            </div>
          </div>
        ) : (
          <div className="fadein">
            <MdRender text={aiResult} onCopyPrompt={copyPromptCb}/>

            {/* ── FIVE SCENE STORYBOARD ── */}
            {tab === 'generator' && scenes.length > 0 && (
              <div style={{marginTop:28}}>
                <div style={{marginBottom:12}}>
                  <div className="gsk" style={{color:'var(--cyan)',fontSize:'.95rem',fontWeight:700,marginBottom:4}}>🎬 Five Scene Storyboard</div>
                  {autoGenImages && (
                    <div className="img-gen-bar">
                      <span className="spin">{I.load}</span>
                      <span>Auto-generating images per scene — scene diproses satu per satu dengan jeda 1.6 detik</span>
                    </div>
                  )}
                  <p style={{fontSize:'.75rem',color:'var(--txm)'}}>
                    Setiap scene menghasilkan 1 gambar AI. Klik <b style={{color:'var(--cyan)'}}>Re-generate</b> untuk variasi baru.
                  </p>
                </div>
                <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(290px,1fr))',gap:14}}>
                  {scenes.map((scene, idx) => (
                    <SceneImageCard
                      key={idx}
                      scene={scene}
                      idx={idx}
                      apiKey={apiKey}
                      productName={form.name || 'Product'}
                      onToast={onToast}
                      autoGenerate={autoGenImages}
                    />
                  ))}
                </div>
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

/* ── APP ROOT ── */
function AppContent() {
  const [theme, setTheme] = useState(()=>safeGet('veo_theme','dark'));
  const [apiKey, setApiKey] = useState(()=>safeGet('veo_studio_apikey',''));
  const [activeTab, setActiveTab] = useState('planner');
  const [sidebarOpen, setSidebarOpen] = useState(false);
  const [toast, setToast] = useState('');
  const [form, setForm] = useState({
    name:"Basreng Kaffir Jeruk Purut",
    desc:"Camilan bakso goreng super renyah beraroma irisan daun jeruk purut segar dengan limpahan cabai asli dan gurih umami tinggi.",
    characteristics:"Renyah empuk tidak keras, potongan presisi, wangi jeruk melimpah, rasa pedas berlevel tahan 6 bulan.",
    price:"20000",capital:"3000000",targetOmzet:"45000000",
    location:"Bandung, Jawa Barat",
    initialMarket:"Pecinta jajanan pedas instan usia remaja hingga dewasa (15-35 tahun) di media sosial Indonesia.",
    industry:"Food (Culinary & Food)",angle:"FOMO",hook:"Pattern Interrupt",
  });
  const [ugcForm, setUgcForm] = useState({useAutonomous:false,name:'',desc:''});
  const [imgProduct, setImgProduct] = useState(null);
  const [imgModel, setImgModel] = useState(null);
  const [aiResult, setAiResult] = useState('');
  const [loading, setLoading] = useState(false);
  const [loadingMsg, setLoadingMsg] = useState('');
  const [loadingPct, setLoadingPct] = useState(0);
  const [scenes, setScenes] = useState([]);
  const [autoGenImages, setAutoGenImages] = useState(false);
  const msgRef = useRef(null);
  const pctRef = useRef(null);

  useEffect(() => {
    document.documentElement.setAttribute('data-theme', theme);
    safeSet('veo_theme', theme);
  }, [theme]);

  const toggleTheme = () => setTheme(t => t === 'dark' ? 'light' : 'dark');
  const showToast = (msg) => { setToast(msg); setTimeout(()=>setToast(''), 2800); };

  const buildPrompt = () => {
    const ctx = ugcForm.useAutonomous && ugcForm.name
      ? `Nama Produk: ${ugcForm.name}\nDeskripsi: ${ugcForm.desc}`
      : `Nama Produk: ${form.name}
Deskripsi: ${form.desc}
Karakteristik: ${form.characteristics}
Harga Jual: Rp ${parseInt(form.price||0).toLocaleString('id')}
Modal Awal: Rp ${parseInt(form.capital||0).toLocaleString('id')}
Target Omzet/Bulan: Rp ${parseInt(form.targetOmzet||0).toLocaleString('id')}
Lokasi: ${form.location}
Target Pasar: ${form.initialMarket}
Kategori Industri: ${form.industry}
Marketing Angle: ${form.angle}
Hook Style: ${form.hook}`;
    return ctx;
  };

  const buildMessages = () => {
    const parts = [];
    if (activeTab === 'generator') {
      if (imgProduct?.data) parts.push({inlineData:{mimeType:imgProduct.mime,data:imgProduct.data}});
      if (imgModel?.data) parts.push({inlineData:{mimeType:imgModel.mime,data:imgModel.data}});
    }
    parts.push({text: buildPrompt()});
    return [{role:'user', parts}];
  };

  const startLoader = (tab) => {
    const msgs = LOADING_MSGS[tab] || LOADING_MSGS.planner;
    let idx = 0;
    setLoadingMsg(msgs[0]);
    setLoadingPct(5);
    msgRef.current = setInterval(() => {
      idx = (idx + 1) % msgs.length;
      setLoadingMsg(msgs[idx]);
    }, 2400);
    pctRef.current = setInterval(() => {
      setLoadingPct(p => Math.min(p + Math.random() * 8, 88));
    }, 800);
  };

  const generate = async () => {
    if (!apiKey) return;
    setLoading(true);
    setAiResult('');
    setScenes([]);
    setAutoGenImages(false);
    setLoadingPct(0);
    startLoader(activeTab);

    try {
      const payload = {
        system_instruction: {parts: [{text: SYS[activeTab] || SYS.planner}]},
        contents: buildMessages(),
        generationConfig: {
          temperature: 0.9,
          maxOutputTokens: 65536,  // FIX: was 8192 — too small for planner/calendar
        },
      };
      const res = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`,
        {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload)}
      );

      if (!res.ok) {
        const e = await res.json().catch(()=>({}));
        throw new Error(e?.error?.message || `HTTP ${res.status}`);
      }

      const data = await res.json();

      // Handle safety blocks / finish reason
      const candidate = data?.candidates?.[0];
      if (!candidate) throw new Error('Tidak ada respons dari AI. Coba lagi.');
      if (candidate.finishReason === 'SAFETY') throw new Error('Konten diblokir oleh filter keamanan Gemini. Sesuaikan deskripsi produk.');

      const text = candidate?.content?.parts?.map(p => p.text || '').join('') || '';
      if (!text) throw new Error('Respons AI kosong. Pastikan API Key valid dan coba lagi.');

      setAiResult(text);
      setLoadingPct(100);

      if (activeTab === 'generator') {
        const extracted = extractScenes(text);
        setScenes(extracted);
        if (extracted.length > 0 && apiKey) {
          // Auto-trigger image generation
          setTimeout(() => setAutoGenImages(true), 500);
        }
      }
    } catch(err) {
      setAiResult(
        `## ❌ Error\n\n**${err.message}**\n\n**Langkah debug:**\n\n- Pastikan API Key Gemini valid di Google AI Studio\n- Periksa koneksi internet\n- Coba kembali dalam beberapa detik\n- Model: gemini-2.5-flash harus tersedia di akun Anda`
      );
    } finally {
      clearInterval(msgRef.current);
      clearInterval(pctRef.current);
      setLoading(false);
    }
  };

  const TABS_NAV = [
    {id:'planner', label:'Bisnis', icon:I.chart},
    {id:'calendar', label:'Kalender', icon:I.cal},
    {id:'caption', label:'Caption', icon:I.pen},
    {id:'generator', label:'UGC', icon:I.vid},
  ];

  return (
    <div className="layout">
      {/* Sidebar overlay */}
      <div
        className={`sidebar-overlay${sidebarOpen?' show':''}`}
        onClick={()=>setSidebarOpen(false)}
      />

      {/* Sidebar */}
      <Sidebar
        form={form} setForm={setForm}
        apiKey={apiKey} setApiKey={setApiKey}
        theme={theme} toggleTheme={toggleTheme}
        activeTab={activeTab} setActiveTab={setActiveTab}
        isOpen={sidebarOpen}
        onClose={()=>setSidebarOpen(false)}
      />

      {/* Main */}
      <div className="main">
        {/* Mobile topbar */}
        <div className="mobile-topbar">
          <button onClick={()=>setSidebarOpen(v=>!v)} className="btn btn-g" style={{padding:'7px 9px',flexShrink:0}}>{I.menu}</button>
          <div className="gsk grad" style={{fontSize:'.92rem',fontWeight:800,flex:1}}>VEO 3 PRO</div>
          <button onClick={toggleTheme} className="btn btn-g" style={{padding:'7px 9px',flexShrink:0}}>{theme==='dark'?I.sun:I.moon}</button>
          <button onClick={generate} disabled={!apiKey||loading} className="btn btn-c btn-sm" style={{flexShrink:0,padding:'7px 12px'}}>
            {loading ? <span className="spin">{I.load}</span> : I.spark}
            {loading ? '' : 'Run'}
          </button>
        </div>

        <MainContent
          tab={activeTab}
          form={form}
          apiKey={apiKey}
          ugcForm={ugcForm} setUgcForm={setUgcForm}
          imgProduct={imgProduct} setImgProduct={setImgProduct}
          imgModel={imgModel} setImgModel={setImgModel}
          aiResult={aiResult}
          loading={loading}
          loadingMsg={loadingMsg}
          loadingPct={loadingPct}
          scenes={scenes}
          autoGenImages={autoGenImages}
          onGenerate={generate}
          onToast={showToast}
        />
      </div>

      {/* Bottom Nav */}
      <nav className="bottom-nav">
        {TABS_NAV.map(t => (
          <button
            key={t.id}
            className={`bnav-item${activeTab===t.id?' active':''}`}
            onClick={()=>setActiveTab(t.id)}
          >
            {t.icon}
            <span>{t.label}</span>
          </button>
        ))}
        <button
          className={`bnav-item${sidebarOpen?' active':''}`}
          onClick={()=>setSidebarOpen(v=>!v)}
        >
          {I.menu}
          <span>Menu</span>
        </button>
      </nav>

      {/* Toast */}
      {toast && (
        <div className="toast">
          {I.chk} {toast}
        </div>
      )}
    </div>
  );
}

/* ── ERROR BOUNDARY ── */
class ErrorBoundary extends React.Component {
  constructor(p) { super(p); this.state = {err: null}; }
  static getDerivedStateFromError(e) { return {err: e}; }
  handleReset() { try{localStorage.clear();}catch{} window.location.reload(); }
  render() {
    if (!this.state.err) return this.props.children;
    return (
      <div style={{minHeight:'100vh',background:'#030712',display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
        <div style={{maxWidth:500,background:'rgba(239,68,68,.08)',border:'1px solid rgba(239,68,68,.25)',borderRadius:16,padding:28,textAlign:'center'}}>
          <div style={{fontSize:44,marginBottom:12}}>⚠️</div>
          <h2 style={{color:'#f87171',fontSize:'1.2rem',marginBottom:10,fontFamily:"'Space Grotesk',sans-serif"}}>Error Aplikasi</h2>
          <p style={{color:'#94a3b8',fontSize:'.78rem',marginBottom:18,fontFamily:'monospace',background:'rgba(0,0,0,.3)',padding:10,borderRadius:7,textAlign:'left',whiteSpace:'pre-wrap'}}>{this.state.err?.toString()}</p>
          <button onClick={()=>this.handleReset()} style={{background:'linear-gradient(135deg,#0891b2,#6d28d9)',color:'#fff',border:'none',padding:'10px 22px',borderRadius:9,cursor:'pointer',fontWeight:600}}>
            🔄 Reset & Muat Ulang
          </button>
        </div>
      </div>
    );
  }
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <ErrorBoundary><AppContent/></ErrorBoundary>
);
</script>
</body>
