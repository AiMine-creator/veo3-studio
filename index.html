<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VEO 3 PRO STUDIO - Premium UGC Suite</title>
    
    <!-- Pustaka Utama (Wajib agar React & Tailwind Jalan) -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* Paksa background awal berwarna terang/putih bersih dan teks gelap */
        body { 
            background-color: #f8fafc !important; 
            color: #0f172a !important; 
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif; 
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // 1. Mengaktifkan semua fungsi ikon Lucide agar tidak error di browser
        const { 
            Sparkles, Lock, Shield, Package, ShoppingBag, ChevronRight, 
            Download, Eye, Sun, Moon, RefreshCw, Image, FileText, Video, 
            Layers, CheckCircle2, AlertCircle, HelpCircle, Settings, Trash2
        } = window.lucide || {};

        // 2. Mengaktifkan React Hooks bawaan browser
        const { useState, useEffect, useRef, useMemo } = React;

        // ==========================================================
        // COMPONENT UTAMA: APP (Sudah Disesuaikan ke Tema Terang)
        // ==========================================================
        function App() {
            // State untuk menyimpan API Key di localStorage secara aman
            const [apiKey, setApiKey] = useState(() => localStorage.getItem('gemini_api_key') || '');
            const [showKey, setShowKey] = useState(false);
            const [isDarkMode, setIsDarkMode] = useState(false); // Default dirubah ke false (Light Mode)

            // State Parameter Bisnis Global
            const [productName, setProductName] = useState('Basreng Kaffir Jeruk Purut');
            const [productDesc, setProductDesc] = useState('Camilan bakso goreng super renyah beraroma irisan daun jeruk purut segar dengan limpahan cabai asli dan gurih umami tinggi.');

            useEffect(() => {
                localStorage.setItem('gemini_api_key', apiKey);
            }, [apiKey]);

            const toggleTheme = () => {
                setIsDarkMode(!isDarkMode);
            };

            return (
                <div className={`min-h-screen transition-colors duration-300 ${isDarkMode ? 'bg-slate-950 text-slate-100' : 'bg-slate-50 text-slate-900'}`}>
                    
                    {/* NAVBAR / HEADER */}
                    <header className={`border-b px-6 py-4 flex items-center justify-between ${isDarkMode ? 'bg-slate-900/50 border-slate-800' : 'bg-white border-slate-200/80 shadow-sm'}`}>
                        <div className="flex items-center gap-3">
                            <div className="bg-cyan-500 p-2 rounded-xl text-white shadow-md shadow-cyan-500/20">
                                <Sparkles className="w-6 h-6" />
                            </div>
                            <div>
                                <h1 className="text-xl font-bold tracking-tight bg-gradient-to-r from-cyan-500 to-blue-600 bg-clip-text text-transparent">
                                    VEO 3 PRO STUDIO
                                </h1>
                                <p className={`text-xs font-semibold tracking-wider uppercase ${isDarkMode ? 'text-slate-400' : 'text-slate-500'}`}>
                                    PREMIUM UGC SUITE & BUSINESS ARCHITECT V3.5
                                </p>
                            </div>
                        </div>

                        <div className="flex items-center gap-4">
                            {/* Tombol Pengubah Tema */}
                            <button 
                                onClick={toggleTheme}
                                className={`p-2.5 rounded-xl border transition-all ${isDarkMode ? 'bg-slate-800 border-slate-700 text-yellow-400 hover:bg-slate-700' : 'bg-slate-100 border-slate-200 text-slate-700 hover:bg-slate-200'}`}
                                title={isDarkMode ? "Ubah ke Mode Terang" : "Ubah ke Mode Gelap"}
                            >
                                {isDarkMode ? <Sun className="w-5 h-5" /> : <Moon className="w-5 h-5" />}
                            </button>

                            <div className={`flex items-center gap-2 px-3 py-1.5 rounded-full text-xs font-medium border ${isDarkMode ? 'bg-emerald-950/30 border-emerald-800 text-emerald-400' : 'bg-emerald-50 border-emerald-200 text-emerald-700'}`}>
                                <span className="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                                System Engine Gemini 2.5 Flash
                            </div>
                        </div>
                    </header>

                    {/* MAIN CONTENT AREA */}
                    <main className="max-w-7xl mx-auto p-6 space-y-6">
                        
                        {/* SECTION 1: GOOGLE GEMINI API KEY */}
                        <section className={`p-6 rounded-2xl border transition-all ${isDarkMode ? 'bg-slate-900/40 border-slate-800' : 'bg-white border-slate-200 shadow-sm'}`}>
                            <div className="flex items-center justify-between mb-4">
                                <div className="flex items-center gap-2.5">
                                    <Lock className="w-5 h-5 text-cyan-500" />
                                    <h2 className="text-lg font-bold tracking-tight">GOOGLE GEMINI API KEY</h2>
                                </div>
                                <Shield className="w-5 h-5 text-emerald-500" />
                            </div>
                            <p className={`text-sm mb-4 ${isDarkMode ? 'text-slate-400' : 'text-slate-500'}`}>
                                Masukkan kunci API Gemini resmi Anda. Seluruh pemrosesan dilakukan secara langsung di sisi klien dan tidak pernah dikirim ke server pihak ketiga.
                            </p>
                            <div className="relative">
                                <input 
                                    type={showKey ? "text" : "password"}
                                    value={apiKey}
                                    onChange={(e) => setApiKey(e.target.value)}
                                    placeholder="AIzaSy..."
                                    className={`w-full px-4 py-3 rounded-xl border font-mono text-sm tracking-wide transition-all focus:outline-none focus:ring-2 focus:ring-cyan-500 ${isDarkMode ? 'bg-slate-950 border-slate-800 text-slate-200' : 'bg-slate-50 border-slate-200 text-slate-800'}`}
                                />
                                <button 
                                    onClick={() => setShowKey(!showKey)}
                                    className="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 transition-colors"
                                >
                                    <Eye className="w-5 h-5" />
                                </button>
                            </div>
                            <div className="flex items-center gap-2 mt-3 text-xs text-amber-500 font-medium">
                                <AlertCircle className="w-4 h-4" />
                                <span>Menunggu Input Kunci API...</span>
                            </div>
                        </section>

                        {/* SECTION 2: PARAMETER BISNIS GLOBAL */}
                        <section className={`p-6 rounded-2xl border transition-all ${isDarkMode ? 'bg-slate-900/40 border-slate-800' : 'bg-white border-slate-200 shadow-sm'}`}>
                            <div className="flex items-center gap-2.5 mb-6">
                                <ShoppingBag className="w-5 h-5 text-purple-500" />
                                <h2 className="text-lg font-bold tracking-tight uppercase">Parameter Bisnis Global</h2>
                            </div>

                            <div className="space-y-5">
                                <div>
                                    <label className={`block text-xs font-bold uppercase tracking-wider mb-2 ${isDarkMode ? 'text-slate-400' : 'text-slate-600'}`}>
                                        $ Nama Produk / Bisnis
                                    </label>
                                    <input 
                                        type="text"
                                        value={productName}
                                        onChange={(e) => setProductName(e.target.value)}
                                        className={`w-full px-4 py-3 rounded-xl border font-medium transition-all focus:outline-none focus:ring-2 focus:ring-purple-500 ${isDarkMode ? 'bg-slate-950 border-slate-800 text-slate-100' : 'bg-slate-50 border-slate-200 text-slate-900'}`}
                                    />
                                </div>

                                <div>
                                    <label className={`block text-xs font-bold uppercase tracking-wider mb-2 ${isDarkMode ? 'text-slate-400' : 'text-slate-600'}`}>
                                        Deskripsi Singkat & Cara Kerja
                                    </label>
                                    <textarea 
                                        rows="3"
                                        value={productDesc}
                                        onChange={(e) => setProductDesc(e.target.value)}
                                        className={`w-full px-4 py-3 rounded-xl border transition-all focus:outline-none focus:ring-2 focus:ring-purple-500 ${isDarkMode ? 'bg-slate-950 border-slate-800 text-slate-100' : 'bg-slate-50 border-slate-200 text-slate-900'}`}
                                    ></textarea>
                                </div>
                            </div>
                        </section>

                    </main>
                </div>
            );
        }

        // ==========================================================
        // 3. JALUR RENDER UTAMA (JANGAN DIUBAH)
        // ==========================================================
        const rootElement = document.getElementById('root');
        const root = ReactDOM.createRoot(rootElement);
        root.render(React.createElement(App));
    </script>
</body>
</html>
