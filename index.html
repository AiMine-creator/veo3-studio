<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VEO 3 PRO STUDIO - Premium UGC Suite</title>
    
    <!-- CDN STABIL - Runtime Langsung Tanpa Compiler -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { 
            background-color: #0b0f19 !important; 
            color: #f1f5f9 !important;
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 0;
        }
        .custom-input {
            background-color: #1e293b !important;
            color: #ffffff !important;
            border: 1px solid #334155 !important;
        }
        .custom-input:focus {
            border-color: #06b6d4 !important;
            outline: none;
        }
    </style>
</head>
<body>
    <div id="root">
        <!-- Fallback Loader Menunggu React Siap -->
        <div id="fallback-loader" style="display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; background-color: #0b0f19;">
            <h2 style="color: #0ea5e9; font-family: sans-serif; margin-bottom: 8px; letter-spacing: 0.05em;">VEO 3 PRO STUDIO</h2>
            <p style="color: #94a3b8; font-family: sans-serif; font-size: 13px;">Memuat Engine UI Komersial...</p>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Komponen Pengaman Ikon Lucide - Mencegah Crash jika objek belum siap
        const SafeIcon = ({ name, className = "w-4 h-4", ...props }) => {
            useEffect(() => {
                if (window.lucide && typeof window.lucide.createIcons === 'function') {
                    window.lucide.createIcons();
                }
            }, [name]);

            const icons = window.lucide || {};
            const TargetIcon = icons[name];
            if (TargetIcon) {
                return <TargetIcon className={className} {...props} />;
            }
            // Fallback kotak kecil jika icon gagal dimuat sementara
            return <span className={`inline-block border border-current rounded-sm ${className}`} style={{ opacity: 0.5 }}></span>;
        };

        const INDUSTRY_CATEGORIES = [
          { value: "food", label: "Culinary & Food (Kuliner Maknyus)" },
          { value: "beverage", label: "Beverage & Drinks (Minuman Kekinian)" },
          { value: "fashion", label: "Fashion & Apparel (Gaya & Busana)" },
          { value: "beauty", label: "Beauty & Skincare (Kecantikan & Kulit)" },
          { value: "healthcare", label: "Healthcare & Wellness (Kesehatan)" },
          { value: "saas_tech", label: "SaaS & Software Technology" },
          { value: "local_umkm", label: "Local UMKM & Handcrafts" }
        ];

        const MARKETING_ANGLES = [
          { value: "FOMO", label: "FOMO (Takut Ketinggalan Trend)" },
          { value: "Social Proof", label: "Social Proof (Rekomendasi Massal)" },
          { value: "Authority", label: "Authority (Edukasi Ahli)" },
          { value: "Transformation", label: "Transformation (Sebelum vs Sesudah)" }
        ];

        const VIRAL_HOOK_STYLES = [
          { value: "Pattern Interrupt", label: "Pattern Interrupt (Stop Jari 1 Detik)" },
          { value: "Curiosity Gap", label: "Curiosity Gap (Memicu Penasaran)" },
          { value: "Bold Claim", label: "Bold Claim (Klaim Berani)" }
        ];

        // Parser Sederhana dan Aman untuk Menghindari Fatal Crash UI
        const parseMarkdownToReact = (text) => {
          if (!text) return null;
          try {
            const lines = text.split('\n');
            const elements = [];

            for (let i = 0; i < lines.length; i++) {
              const line = lines[i].trim();
              if (line === '') continue;

              // Abaikan baris tabel mentah agar tidak merusak rendering jika format AI tidak sempurna
              if (line.startsWith('|')) {
                continue; 
              }
              if (line.startsWith('###')) {
                elements.push(<h4 key={i} className="text-base font-bold text-cyan-400 mt-4 mb-2">{line.replace('###', '').trim()}</h4>);
                continue;
              }
              if (line.startsWith('##') || line.startsWith('#')) {
                elements.push(<h3 key={i} className="text-lg font-black text-purple-400 mt-5 mb-3">{line.replace(/^#+\s*/, '').trim()}</h3>);
                continue;
              }
              if (line.startsWith('-') || line.startsWith('*')) {
                elements.push(<div key={i} className="text-sm pl-4 my-1 text-slate-300">• {line.replace(/^[-*]\s*/, '').trim()}</div>);
                continue;
              }
              elements.push(<p key={i} className="text-sm text-slate-300 my-1">{line}</p>);
            }
            return <div className="space-y-1">{elements}</div>;
          } catch (e) {
            return <p className="text-xs text-red-400">Gagal memproses format teks output.</p>;
          }
        };

        function App() {
          const [apiKey, setApiKey] = useState(() => localStorage.getItem('veo_studio_apikey') || '');
          const [showApiKey, setShowApiKey] = useState(false);

          const [formData, setFormData] = useState({
            name: 'Basreng Kaffir Jeruk Purut',
            desc: 'Camilan bakso goreng super renyah beraroma irisan daun jeruk purut segar dengan limpahan cabai asli dan gurih umami tinggi.',
            characteristics: 'Renyah empuk tidak keras, potongan presisi, wangi jeruk melimpah, rasa pedas berlevel tahan 6 bulan.',
            price: '20000',
            capital: '3000000',
            targetOmzet: '45000000',
            location: 'Bandung, Jawa Barat',
            targetMarket: 'Pecinta jajanan pedas instan usia remaja hingga dewasa (15-35 tahun) di media sosial Indonesia.',
            industryCategory: 'food',
            marketingAngle: 'FOMO',
            viralHookStyle: 'Pattern Interrupt'
          });

          const [activeTab, setActiveTab] = useState('planner');
          const [isLoading, setIsLoading] = useState(false);
          const [outputs, setOutputs] = useState({ planner: '', calendar: '', caption: '', generator: '' });

          useEffect(() => {
            const loader = document.getElementById('fallback-loader');
            if (loader) loader.remove();
          }, []);

          const handleSaveApiKey = (key) => {
            setApiKey(key);
            localStorage.setItem('veo_studio_apikey', key);
          };

          const executeAction = async () => {
            if (!apiKey) return;
            setIsLoading(true);
            try {
              // Menggunakan endpoint Gemini API yang stabil
              const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${apiKey}`;
              const response = await fetch(apiUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  contents: [{ parts: [{ text: `Buatkan analisis komersial taktis untuk fitur/tab [${activeTab}] berdasarkan data produk berikut: ${JSON.stringify(formData)}. Tulis langsung poin-poinnya menggunakan format Markdown standar tanpa kalimat pembuka/penutup.` }] }]
                })
              });
              const data = await response.json();
              const text = data?.candidates?.[0]?.content?.parts?.[0]?.text || "Gagal memperoleh balasan data dari sistem AI.";
              setOutputs(prev => ({ ...prev, [activeTab]: text }));
            } catch (err) {
              setOutputs(prev => ({ ...prev, [activeTab]: `Eror API Konten: ${err.message}` }));
            } finally {
              setIsLoading(false);
            }
          };

          return (
            <div className="min-h-screen flex flex-col bg-[#0b0f19] text-slate-100">
              
              {/* HEADER */}
              <header className="border-b border-slate-800 sticky top-0 z-40 px-6 py-4 bg-[#0f172a]">
                <div className="max-w-7xl mx-auto flex justify-between items-center">
                  <div className="flex items-center gap-3">
                    <div className="p-2 bg-slate-800 rounded-xl border border-slate-700">
                      <SafeIcon className="w-5 h-5 text-cyan-400" name="Flame"/>
                    </div>
                    <div>
                      <h1 className="text-lg md:text-xl font-black bg-gradient-to-r from-cyan-400 to-indigo-400 bg-clip-text text-transparent tracking-wide">VEO 3 PRO STUDIO</h1>
                      <p className="text-[10px] text-slate-400 font-mono tracking-wider uppercase">Premium UGC Suite & Business Architect V3.5</p>
                    </div>
                  </div>
                  <div className="text-xs font-mono text-cyan-400 bg-slate-800 border border-slate-700 px-3 py-1.5 rounded-xl flex items-center gap-2">
                    <span className="w-2 h-2 rounded-full bg-emerald-400"></span>
                    <span>⚡ Engine: Gemini Pro</span>
                  </div>
                </div>
              </header>

              {/* DASHBOARD BODY */}
              <main className="max-w-7xl w-full mx-auto p-4 md:p-6 grid grid-cols-1 lg:grid-cols-12 gap-6 flex-grow">
                
                {/* SIDEBAR INPUT */}
                <aside className="lg:col-span-4 space-y-4">
                  
                  {/* API BOX */}
                  <div className="p-5 rounded-2xl border bg-[#0f172a] border-slate-800">
                    <div className="flex items-center gap-2 mb-2">
                      <SafeIcon className="w-4 h-4 text-cyan-400" name="Lock"/>
                      <label className="text-xs font-bold uppercase tracking-wider text-slate-300 block">Google Gemini API Key</label>
                    </div>
                    <div className="relative flex items-center">
                      <input 
                        type={showApiKey ? "text" : "password"} 
                        placeholder="Masukkan AIzaSy..." 
                        value={apiKey} 
                        onChange={(e) => handleSaveApiKey(e.target.value)}
                        className="w-full rounded-xl pl-4 pr-10 py-2.5 text-xs font-mono custom-input"
                      />
                      <button onClick={() => setShowApiKey(!showApiKey)} className="absolute right-3 text-slate-400 hover:text-cyan-400">
                        <SafeIcon className="w-4 h-4" name={showApiKey ? "EyeOff" : "Eye"}/>
                      </button>
                    </div>
                    {!apiKey && <p className="text-[10px] text-amber-400 mt-2 font-mono">⚠️ Menunggu Input Kunci API...</p>}
                  </div>

                  {/* MAIN PARAMETERS */}
                  <div className="p-5 rounded-2xl border bg-[#0f172a] border-slate-800 space-y-3">
                    <div className="border-b border-slate-800 pb-2 flex items-center gap-2">
                      <SafeIcon className="w-4 h-4 text-purple-400" name="Briefcase"/>
                      <h3 className="text-xs font-bold uppercase tracking-wider text-slate-300">Parameter Bisnis Global</h3>
                    </div>
                    
                    <div>
                      <label className="text-[10px] font-bold text-slate-400 uppercase block mb-1">Nama Produk / Bisnis</label>
                      <input type="text" value={formData.name} onChange={(e) => setFormData({...formData, name: e.target.value})} className="w-full rounded-xl p-2.5 text-xs custom-input" />
                    </div>

                    <div>
                      <label className="text-[10px] font-bold text-slate-400 uppercase block mb-1">Deskripsi Singkat & Cara Kerja</label>
                      <textarea rows={2} value={formData.desc} onChange={(e) => setFormData({...formData, desc: e.target.value})} className="w-full rounded-xl p-2.5 text-xs custom-input" />
                    </div>

                    <div>
                      <label className="text-[10px] font-bold text-slate-400 uppercase block mb-1">Keunggulan Utama / Karakter Fisik</label>
                      <input type="text" value={formData.characteristics} onChange={(e) => setFormData({...formData, characteristics: e.target.value})} className="w-full rounded-xl p-2.5 text-xs custom-input" />
                    </div>

                    <div className="grid grid-cols-2 gap-2">
                      <div>
                        <label className="text-[9px] font-bold text-slate-400 uppercase block mb-1">Harga Jual (Rp)</label>
                        <input type="number" value={formData.price} onChange={(e) => setFormData({...formData, price: e.target.value})} className="w-full rounded-xl p-2.5 text-xs custom-input" />
                      </div>
                      <div>
                        <label className="text-[9px] font-bold text-slate-400 uppercase block mb-1">Target Omzet (Rp)</label>
                        <input type="number" value={formData.targetOmzet} onChange={(e) => setFormData({...formData, targetOmzet: e.target.value})} className="w-full rounded-xl p-2.5 text-xs custom-input" />
                      </div>
                    </div>

                    <div>
                      <label className="text-[10px] font-bold text-slate-400 uppercase block mb-1">Kategori Industri Makro</label>
                      <select value={formData.industryCategory} onChange={(e) => setFormData({...formData, industryCategory: e.target.value})} className="w-full rounded-xl p-2.5 text-xs custom-input text-white">
                        {INDUSTRY_CATEGORIES.map(c => <option key={c.value} value={c.value} className="text-slate-900">{c.label}</option>)}
                      </select>
                    </div>

                    <div>
                      <label className="text-[10px] font-bold text-slate-400 uppercase block mb-1">Strategi Marketing Angle</label>
                      <select value={formData.marketingAngle} onChange={(e) => setFormData({...formData, marketingAngle: e.target.value})} className="w-full rounded-xl p-2.5 text-xs custom-input text-white">
                        {MARKETING_ANGLES.map(m => <option key={m.value} value={m.value} className="text-slate-900">{m.label}</option>)}
                      </select>
                    </div>

                    <div>
                      <label className="text-[10px] font-bold text-slate-400 uppercase block mb-1">Viral Hook Style</label>
                      <select value={formData.viralHookStyle} onChange={(e) => setFormData({...formData, viralHookStyle: e.target.value})} className="w-full rounded-xl p-2.5 text-xs custom-input text-white">
                        {VIRAL_HOOK_STYLES.map(h => <option key={h.value} value={h.value} className="text-slate-900">{h.label}</option>)}
                      </select>
                    </div>
                  </div>
                </aside>

                {/* WORKSPACE PREVIEW */}
                <section className="lg:col-span-8 flex flex-col space-y-4">
                  
                  {/* TABS */}
                  <div className="p-1.5 rounded-xl border bg-[#0f172a] border-slate-800 flex gap-1">
                    {[
                      { id: 'planner', label: 'Perencana Bisnis' },
                      { id: 'calendar', label: 'Kalender Konten' },
                      { id: 'caption', label: 'Caption Viral Lab' },
                      { id: 'generator', label: 'Multimodal UGC' }
                    ].map((tab) => (
                      <button 
                        key={tab.id} 
                        onClick={() => setActiveTab(tab.id)} 
                        className={`flex-1 py-2.5 text-center text-xs font-bold uppercase tracking-wider rounded-lg transition ${activeTab === tab.id ? 'bg-cyan-500 text-white' : 'text-slate-400 hover:text-slate-200'}`}
                      >
                        {tab.label}
                      </button>
                    ))}
                  </div>

                  {/* TERMINAL CONSOLE */}
                  <div className="p-6 rounded-2xl border min-h-[460px] flex flex-col justify-between bg-[#111827] border-slate-800">
                    <div className="w-full">
                      <div className="flex justify-between items-center border-b border-slate-800 pb-3 mb-4">
                        <span className="text-xs font-bold uppercase tracking-wider text-slate-400 flex items-center gap-2">
                          <span className="w-2 h-2 rounded-full bg-cyan-400 animate-pulse"></span> Terminal Output ({activeTab})
                        </span>
                      </div>

                      <div className="workspace-output">
                        {isLoading ? (
                          <div className="py-24 text-center space-y-3">
                            <div className="w-10 h-10 border-4 border-cyan-400 border-t-transparent rounded-full animate-spin mx-auto"></div>
                            <p className="text-xs font-mono text-cyan-400 animate-pulse uppercase tracking-widest">Memproses Kompilasi Data AI...</p>
                          </div>
                        ) : outputs[activeTab] ? (
                          <div className="prose max-w-none text-slate-100">{parseMarkdownToReact(outputs[activeTab])}</div>
                        ) : (
                          <div className="py-20 text-center text-slate-500 space-y-3">
                            <SafeIcon className="w-8 h-8 mx-auto text-slate-600" name="Sparkles"/>
                            <p className="text-xs font-bold uppercase tracking-wide text-slate-300">Studio Siap Beroperasi</p>
                            <p className="text-[11px] text-slate-400 max-w-xs mx-auto">Silakan isi Google Gemini API Key Anda, sesuaikan parameter produk di panel kiri, lalu klik tombol kirim di bawah ini.</p>
                          </div>
                        )}
                      </div>
                    </div>

                    <div className="pt-4 mt-6 border-t border-slate-800">
                      <button 
                        onClick={executeAction} 
                        disabled={isLoading || !apiKey} 
                        className={`w-full py-4 rounded-xl font-bold text-xs uppercase tracking-widest text-white transition-all duration-200 ${!apiKey ? 'bg-slate-800 text-slate-500 cursor-not-allowed border border-slate-700' : 'bg-gradient-to-r from-cyan-500 to-indigo-600 hover:shadow-lg hover:shadow-cyan-500/20'}`}
                      >
                        Kirim Perintah Ke AI
                      </button>
                    </div>
                  </div>
                </section>
              </main>

              <footer className="py-4 text-center text-[10px] font-mono border-t border-slate-800 text-slate-600">
                <p>© 2026 Veo 3 Pro Studio Suite V3.5. Dirancang khusus untuk akselerasi pertumbuhan pasar digital Indonesia.</p>
              </footer>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App/>);
    </script>
</body>
</html>
